<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Badgeuse — Restaurant 2026</title>
<style>
  /* ============ POLICES & VARIABLES ============ */
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1420;
    --bg-soft: #161d2e;
    --panel: #1c2538;
    --panel-2: #232e45;
    --line: #2e3a54;
    --ink: #eef2fb;
    --ink-soft: #9aa7c4;
    --ink-dim: #6b7794;
    --accent: #f0a830;        /* ambre chaleureux restaurant */
    --accent-2: #e8743e;      /* orange brûlé */
    --green: #2ecc71;
    --green-deep: #1e9e57;
    --red: #e8556b;
    --red2: #e8556b;
    --rose: #e83e8c;
    --blue: #5b9cf0;
    --shadow: 0 18px 50px rgba(0,0,0,.45);
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(240,168,48,.10), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(232,116,62,.10), transparent 55%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1,h2,h3,.display { font-family: 'Fraunces', serif; font-weight: 600; letter-spacing: -.01em; }

  /* ============ EN-TÊTE ============ */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 26px;
    background: linear-gradient(180deg, rgba(28,37,56,.95), rgba(28,37,56,.75));
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index: 50;
  }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand .logo {
    width:44px; height:44px; border-radius:13px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display:grid; place-items:center; font-size:24px;
    box-shadow: 0 8px 20px rgba(240,168,48,.35);
  }
  .brand .title { font-size: 1.35rem; line-height:1.05; }
  .brand .sub { font-size:.72rem; color:var(--ink-soft); letter-spacing:.14em; text-transform:uppercase; }

  .clock {
    text-align:right; font-variant-numeric: tabular-nums;
  }
  .clock .time { font-size:.78rem; color:var(--ink-soft); }
  .clock .date { font-family:'Fraunces',serif; font-size:1.8rem; font-weight:700; line-height:1; text-transform:capitalize; }

  /* ============ LAYOUT ============ */
  .wrap { max-width: 1180px; margin: 0 auto; padding: 26px; }
  .screen { display:none; animation: fade .4s ease; }
  .screen.active { display:block; }
  @keyframes fade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

  /* ============ CARTES SALARIÉS (badgeage) ============ */
  .section-title { display:flex; align-items:baseline; gap:12px; margin-bottom:4px; }
  .section-title h2 { font-size:1.7rem; }
  .section-title .hint { color:var(--ink-soft); font-size:.9rem; }
  .day-banner {
    margin: 14px 0 22px; padding: 14px 18px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(91,156,240,.14), rgba(91,156,240,.05));
    border:1px solid rgba(91,156,240,.25); color:var(--ink);
    display:flex; align-items:center; gap:12px; font-size:.95rem;
  }
  .day-banner b { color: var(--blue); }

  .grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr));
    gap:16px;
  }
  .emp-card {
    position:relative; cursor:pointer; border:none; text-align:left;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line); border-radius: var(--radius);
    padding:18px; color:var(--ink); transition: transform .18s, box-shadow .18s, border-color .18s;
    font-family:inherit;
  }
  .emp-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
  .emp-card .avatar {
    width:52px; height:52px; border-radius:14px; display:grid; place-items:center;
    font-family:'Fraunces',serif; font-size:1.4rem; font-weight:700; color:#1a1205;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); margin-bottom:12px;
  }
  .emp-card .name { font-weight:600; font-size:1.05rem; }
  .emp-card .role { color:var(--ink-soft); font-size:.82rem; margin-top:2px; }
  .emp-card .status {
    margin-top:12px; font-size:.78rem; padding:5px 10px; border-radius:8px; display:inline-block;
  }
  .st-await { background:rgba(91,156,240,.16); color:var(--blue); }
  .st-in { background:rgba(46,204,113,.16); color:var(--green); }
  .st-done { background:rgba(155,167,196,.16); color:var(--ink-soft); }
  .st-pause { background:rgba(240,168,48,.18); color:var(--accent); }
  .st-pause-over { background:rgba(232,85,107,.20); color:#e8556b; font-weight:700; }
  /* bouton pause repas dans la carte */
  .emp-card .pause-action {
    margin-top:12px; font-size:.8rem; font-weight:600; padding:8px 12px; border-radius:9px;
    background:rgba(240,168,48,.14); color:var(--accent); border:1px solid rgba(240,168,48,.35);
    transition:filter .15s, background .15s;
  }
  .emp-card .pause-action:hover { filter:brightness(1.1); }
  /* carte en pause : liseré ambre ; en dépassement : liseré + fond rouge */
  .emp-card.pause-on { border-color:var(--accent); box-shadow:0 0 0 2px rgba(240,168,48,.25); }
  .emp-card.pause-over {
    border-color:#e8556b; box-shadow:0 0 0 2px rgba(232,85,107,.35);
    background:rgba(232,85,107,.06); animation:pulseRed 1.6s ease-in-out infinite;
  }
  .emp-card.pause-over .pause-action { background:rgba(232,85,107,.16); color:#e8556b; border-color:rgba(232,85,107,.4); }
  @keyframes pulseRed { 0%,100%{box-shadow:0 0 0 2px rgba(232,85,107,.35);} 50%{box-shadow:0 0 0 4px rgba(232,85,107,.18);} }
  .emp-card .renfort-tag {
    position:absolute; top:14px; right:14px; font-size:.65rem; letter-spacing:.08em;
    background:var(--accent-2); color:#fff; padding:3px 8px; border-radius:7px; text-transform:uppercase;
  }

  /* ============ BOUTONS ============ */
  .btn {
    font-family:inherit; font-size:.95rem; font-weight:600; cursor:pointer;
    border:none; border-radius:12px; padding:13px 22px; transition: transform .15s, filter .15s, background .15s;
    display:inline-flex; align-items:center; gap:9px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color:#1a1205; }
  .btn-primary:hover { filter:brightness(1.08); }
  .btn-ghost { background:var(--panel-2); color:var(--ink); border:1px solid var(--line); }
  .btn-ghost:hover { border-color:var(--accent); }
  .btn-green { background: linear-gradient(135deg, var(--green), var(--green-deep)); color:#04210f; }
  .btn-red { background: linear-gradient(135deg, #e8556b, #c43a52); color:#fff; }
  .btn-block { width:100%; justify-content:center; }
  .btn-sm { padding:8px 14px; font-size:.85rem; border-radius:9px; }

  /* ============ MODALE ============ */
  .overlay {
    position:fixed; inset:0; background:rgba(8,11,18,.72); backdrop-filter: blur(6px);
    display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .overlay.active { display:flex; animation: fade .25s; }
  .modal {
    width:100%; max-width:480px; background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line); border-radius:22px; padding:28px; box-shadow:var(--shadow);
    max-height:92vh; overflow-y:auto;
  }
  .modal h3 { font-size:1.5rem; margin-bottom:4px; }
  .modal .modal-sub { color:var(--ink-soft); font-size:.9rem; margin-bottom:20px; }
  .modal-close { float:right; background:none; border:none; color:var(--ink-dim); font-size:1.6rem; cursor:pointer; line-height:1; }

  /* ============ PIN PAD ============ */
  .pin-display { display:flex; gap:12px; justify-content:center; margin:18px 0 22px; }
  .pin-dot { width:18px; height:18px; border-radius:50%; border:2px solid var(--line); transition:.2s; }
  .pin-dot.filled { background:var(--accent); border-color:var(--accent); transform:scale(1.1); }
  .pinpad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .pinkey {
    font-family:'Fraunces',serif; font-size:1.5rem; font-weight:600;
    padding:18px; border-radius:14px; background:var(--panel); border:1px solid var(--line);
    color:var(--ink); cursor:pointer; transition: background .12s, transform .1s;
  }
  .pinkey:hover { background:var(--panel-2); }
  .pinkey:active { transform:scale(.94); background:var(--accent); color:#1a1205; }
  .pinkey.wide { grid-column: span 1; }

  /* ============ SIGNATURE ============ */
  .sig-wrap { border:2px dashed var(--line); border-radius:14px; background:#fbfcff; position:relative; }
  .sig-wrap canvas { width:100%; height:180px; display:block; border-radius:12px; touch-action:none; cursor:crosshair; }
  .sig-hint { position:absolute; inset:0; display:grid; place-items:center; color:#aab; pointer-events:none; font-size:.9rem; }

  /* ============ FORMULAIRES ============ */
  label.field { display:block; margin-bottom:14px; }
  label.field span { display:block; font-size:.82rem; color:var(--ink-soft); margin-bottom:6px; }
  input, select, textarea {
    width:100%; font-family:inherit; font-size:.95rem; padding:12px 14px;
    background:var(--bg-soft); border:1px solid var(--line); border-radius:11px; color:var(--ink);
  }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); }
  textarea { resize:vertical; min-height:70px; }

  /* ============ TABLEAUX ============ */
  .tabs { display:flex; gap:8px; margin:20px 0; flex-wrap:wrap; }
  .tab {
    padding:10px 18px; border-radius:11px; background:var(--panel); border:1px solid var(--line);
    color:var(--ink-soft); cursor:pointer; font-family:inherit; font-size:.9rem; font-weight:500; transition:.15s;
  }
  .tab.active { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#1a1205; border-color:transparent; }

  .table-card { background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:.88rem; }
  th, td { padding:12px 14px; text-align:left; border-bottom:1px solid var(--line); }
  th { background:var(--bg-soft); color:var(--ink-soft); font-weight:600; font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
  tr:last-child td { border-bottom:none; }
  /* Journal : fenêtre déroulante à hauteur fixe, en-tête figé, lignes compactes */
  .journal-scroll { max-height:min(78vh,1180px); overflow:auto; }
  .journal-scroll thead th { position:sticky; top:0; z-index:2; }
  .journal-scroll td { padding:8px 13px; font-size:.82rem; }
  /* En-têtes de pôle (Salle / Cuisine) sur l'écran de pointage */
  .pole-header { display:flex; align-items:center; gap:10px; margin:22px 0 12px; font-size:1.15rem; }
  .pole-header h3 { margin:0; font-weight:700; }
  .pole-count { margin-left:2px; background:var(--bg-soft); color:var(--ink-soft); border-radius:20px; padding:2px 11px; font-size:.8rem; font-weight:600; }
  .pole-empty { color:var(--ink-dim); font-size:.9rem; padding:6px 2px 4px; }
  td.num { font-variant-numeric:tabular-nums; text-align:right; }
  .badge-delta { padding:3px 9px; border-radius:7px; font-weight:600; font-variant-numeric:tabular-nums; }
  .delta-ok { background:rgba(155,167,196,.16); color:var(--ink-soft); }
  .delta-pos { background:rgba(46,204,113,.18); color:var(--green); }
  .delta-neg { background:rgba(232,85,107,.18); color:#e8556b; }
  .sig-thumb { height:34px; background:#fff; border-radius:5px; border:1px solid var(--line); }

  .empty { padding:50px; text-align:center; color:var(--ink-dim); }
  .empty .ico { font-size:2.6rem; opacity:.5; margin-bottom:10px; }

  /* ============ ÉCRAN LOGIN ADMIN ============ */
  .login-card { max-width:420px; margin:60px auto; }
  .role-pills { display:flex; gap:10px; margin-bottom:20px; }
  .role-pill { flex:1; text-align:center; padding:12px; border-radius:12px; background:var(--panel); border:1px solid var(--line); cursor:pointer; font-size:.85rem; transition:.15s; }
  .role-pill.active { border-color:var(--accent); background:var(--panel-2); }

  /* ============ TOAST ============ */
  .toast-zone { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:10px; align-items:center; }
  .toast {
    background:var(--panel-2); border:1px solid var(--line); border-left:4px solid var(--accent);
    padding:14px 20px; border-radius:12px; box-shadow:var(--shadow); font-size:.92rem; min-width:260px;
    animation: toastIn .3s ease;
  }
  .toast.ok { border-left-color:var(--green); }
  .toast.err { border-left-color:#e8556b; }
  @keyframes toastIn { from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }

  .footer-nav { display:flex; justify-content:center; gap:14px; margin-top:30px; padding-bottom:20px; }
  .pill-link { color:var(--ink-soft); font-size:.85rem; cursor:pointer; padding:8px 16px; border-radius:10px; border:1px solid transparent; }
  .pill-link:hover { border-color:var(--line); color:var(--ink); }

  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > * { flex:1; }
  .mt { margin-top:16px; } .mb { margin-bottom:16px; }
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:20px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .stat .v { font-family:'Fraunces',serif; font-size:1.9rem; font-weight:700; }
  .stat .l { color:var(--ink-soft); font-size:.8rem; margin-top:2px; }
  @media (max-width:640px){ .clock .date{font-size:1.3rem;} .brand .title{font-size:1.1rem;} .wrap{padding:16px;} }
</style>
<!-- SDK EmailJS (notification mail). Si pas d'internet, l'app bascule sur le mail pré-rempli. -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<body>
  <div class="topbar">
    <div class="brand">
      <div class="logo">🍽️</div>
      <div>
        <div class="title display">Badgeuse</div>
        <div class="sub">Restaurant 2026</div>
      </div>
    </div>
    <div class="clock">
      <div class="time" id="clkTime">--:--</div>
      <div class="date" id="clkDate">—</div>
    </div>
  </div>

  <div class="wrap">
    <!-- ÉCRAN BADGEAGE -->
    <section id="scr-badge" class="screen active"></section>
    <!-- ÉCRAN ADMIN (manager / dirigeant) -->
    <section id="scr-admin" class="screen"></section>

    <div class="footer-nav">
      <span class="pill-link" onclick="App.showBadge()">🕐 Badgeage</span>
      <span class="pill-link" onclick="App.showAdminLogin()">🔐 Espace gestion</span>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <div class="toast-zone" id="toastZone"></div>

<script>
/* ====================================================================
   BADGEUSE — moteur de données
   Stockage local (localStorage). Aucune dépendance externe.
   ==================================================================== */
"use strict";

const STORE_KEY = "badgeuse_restaurant_2026_v1";

/* ---- Données par défaut (équipe issue du planning) ---- */
const DEFAULT_TEAM = [
  { id:"e1",  nom:"Marie Dupont",    role:"Serveuse",     pin:"1111", access:"salarie" },
  { id:"e2",  nom:"Jean Martin",     role:"Cuisinier",    pin:"2222", access:"salarie" },
  { id:"e3",  nom:"Sophie Bernard",  role:"Hôtesse",      pin:"3333", access:"salarie" },
  { id:"e4",  nom:"Lucas Petit",     role:"Plongeur",     pin:"4444", access:"salarie" },
  { id:"e5",  nom:"Emma Leroy",      role:"Serveuse",     pin:"5555", access:"salarie" },
  { id:"e6",  nom:"Thomas Moreau",   role:"Chef de rang", pin:"6666", access:"salarie" },
  { id:"e7",  nom:"Camille Simon",   role:"Barmaid",      pin:"7777", access:"salarie" },
  { id:"e8",  nom:"Nicolas Laurent", role:"Sous-chef",    pin:"8888", access:"salarie" },
  { id:"e9",  nom:"Julie Roux",      role:"Serveuse",     pin:"9999", access:"salarie" },
  { id:"e10", nom:"Pierre Girard",   role:"Manager",      pin:"1234", access:"manager" },
  { id:"dir", nom:"Direction",       role:"Dirigeant",    pin:"0000", access:"dirigeant" }
];

/* Correspondance code horaire planning -> créneaux prévus.
   Un code peut contenir PLUSIEURS créneaux (services coupés midi + soir).
   Cette table reste utilisée comme "raccourci" : si la case correspond exactement,
   on l'applique direct. Sinon on tente le parser souple ci-dessous. */
const CODE_HORAIRES = {
  "H 19H-23H":              { creneaux:[{debut:"19:00", fin:"23:00"}] },
  "H 11H30-20H30":          { creneaux:[{debut:"11:30", fin:"20:30"}] },
  "H 10H-17H":              { creneaux:[{debut:"10:00", fin:"17:00"}] },
  "H 8H-17H":               { creneaux:[{debut:"08:00", fin:"17:00"}] },
  "H 16H-00H":              { creneaux:[{debut:"16:00", fin:"00:00"}] },
  // Service coupé : midi puis soir
  "H 11H-15H30-18H30-22H30":{ creneaux:[{debut:"11:00", fin:"15:30"}, {debut:"18:30", fin:"22:30"}] }
};
const TOLERANCE_MIN = 5;
const PAUSE_REPAS_MIN = 30; // seuil d'alerte (rouge) pour la pause repas
/* Durée maximale plausible d'UN service (minutes). Au-delà, c'est presque
   toujours une saisie incohérente (ex. départ avant arrivée mal corrigé) :
   on refuse de compter une durée aberrante (~23 h) issue d'un passage minuit
   appliqué à tort. 16 h couvre largement les services de nuit légitimes. */
const MAX_SERVICE_MIN = 16 * 60;

/* ====================================================================
   GESTION SOUPLE DES SALARIÉS
   - PIN temporaire unique généré automatiquement
   - création automatique des salariés détectés dans le fichier importé
   ==================================================================== */
/* Mots de la colonne A à NE PAS prendre pour des noms de salariés */
const NON_NOMS = new Set([
  "", "NOM", "PRENOM", "PRÉNOM", "NOM PRENOM", "SALARIE", "SALARIÉ", "SALARIES", "SALARIÉS",
  "TOTAL", "TOTAUX", "HEURES", "HEURE", "SEMAINE", "MOIS", "JOUR", "JOURS",
  "FICHE PERSONNEL", "PERSONNEL", "EQUIPE", "ÉQUIPE", "PLANNING"
]);
function estNomValide(v) {
  const s = String(v || "").trim();
  if (s.length < 2) return false;                  // trop court
  const up = s.toUpperCase();
  if (NON_NOMS.has(up)) return false;              // mot réservé exact
  if (/TOTAL|TOTAUX|ÉQUIPE|EQUIPE|PERSONNEL/.test(up)) return false; // lignes de totaux / en-têtes
  if (/^[\d\s.,:%-]+$/.test(s)) return false;      // que des chiffres/ponctuation
  if (!/[A-Za-zÀ-ÿ]/.test(s)) return false;        // aucune lettre
  return true;
}
/* ====================================================================
   COMPARAISON DE NOMS (anti-doublon à l'import)
   normNom : clé de comparaison robuste — minuscules, sans accents,
   espace insécable -> espace, ponctuation -> espace, espaces multiples réduits.
   ==================================================================== */
function normNom(s) {
  let t = String(s == null ? "" : s);
  // espace insécable + variantes -> espace simple
  t = t.replace(/[\u00A0\u202F\u2007\u2009]/g, " ");
  // retirer les accents (NFD + suppression des diacritiques)
  try { t = t.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); } catch(_) {}
  t = t.toLowerCase();
  t = t.replace(/[^a-z0-9]+/g, " "); // toute ponctuation / tiret -> espace
  return t.trim().replace(/\s+/g, " ");
}
/* Distance de Levenshtein (petites chaînes) */
function levenshtein(a, b) {
  a = a || ""; b = b || "";
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  let prev = Array.from({length:n+1}, (_,i)=>i), cur = new Array(n+1);
  for (let i=1;i<=m;i++){
    cur[0]=i;
    for (let j=1;j<=n;j++){
      const cost = a[i-1]===b[j-1] ? 0 : 1;
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost);
    }
    [prev,cur] = [cur,prev];
  }
  return prev[n];
}
/* Verdict de comparaison entre deux noms :
   "exact"  : identiques à la casse/espaces près (comportement historique = pas de question)
   "proche" : se ressemblent fortement (accents, ordre des mots, faute de frappe) -> à arbitrer
   "diff"   : sans rapport */
function comparerNoms(a, b) {
  // "exact" = ce que matchEmp rattache automatiquement (minuscules + trim des bords,
  //   espaces internes CONSERVÉS). Tout le reste qui se ressemble devient "proche"
  //   afin d'être arbitré, y compris un espace insécable ou un double espace que
  //   matchEmp ne rattacherait pas (et qui finirait sinon en doublon).
  const ra = String(a||"").trim().toLowerCase();
  const rb = String(b||"").trim().toLowerCase();
  if (ra === rb) return "exact";
  const na = normNom(a), nb = normNom(b);
  if (!na || !nb) return "diff";
  if (na === nb) return "proche";                         // accents / NBSP / ponctuation / espaces
  if (na.split(" ").sort().join(" ") === nb.split(" ").sort().join(" ")) return "proche"; // mêmes mots, ordre inversé
  if (na.replace(/ /g,"") === nb.replace(/ /g,"")) return "proche"; // espace en trop / manquant
  const d = levenshtein(na, nb), L = Math.max(na.length, nb.length);
  if (d <= 2 && d / L <= 0.34) return "proche";           // faute de frappe légère
  return "diff";
}
/* Déduit le niveau d'accès à partir du libellé de poste de la Fiche Personnel */

/* Renvoie le prochain code PIN à 4 chiffres libre (évite 0000 et les codes déjà pris) */

/* Crée dans DB.team tout salarié absent de l'app à partir d'une liste [{nom, poste}].
   Le poste devient le rôle affiché ; un poste "Manager/Responsable/Gérant" donne l'accès gestion.
   Renvoie la liste [{nom, pin, role, access}] des salariés effectivement créés. */
function ajouterSalaries(personnel) {
  const existants = new Set(DB.team.map(e => e.nom.toLowerCase().trim()));
  const used = new Set(DB.team.map(e => e.pin));
  const crees = [];
  (personnel || []).forEach(p => {
    const nom = String(p && p.nom || "").trim();
    if (!estNomValide(nom)) return;
    if (existants.has(nom.toLowerCase())) return;  // déjà présent
    existants.add(nom.toLowerCase());
    const role = String(p && p.poste || "").trim() || "Salarié";
    const access = accesDepuisPoste(p && p.poste);
    const pin = genererPin(used); used.add(pin);
    const id = "e_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    // pas de secteur figé : il se déduit du poste (secteurDe), sauf override manuel
    DB.team.push({ id, nom, role, pin, access });
    crees.push({ id, nom, pin, role, access });
  });
  if (crees.length) saveDB();
  return crees;
}

/* Codes texte explicitement non-horaires (à ignorer SANS prévenir) */
const NON_HORAIRE = new Set([
  "-", "—", "–", "", "REPOS", "OFF", "CONGE", "CONGES", "CONGÉ", "CONGÉS",
  "ABS", "ABSENT", "ABSENCE", "MAL", "MALADIE", "AT", "FORMATION", "FORM"
]);

/* Parser souple d'horaires.
   Accepte par exemple : "H 8H-17H", "8H-17H", "08:00-17:00", "h 11h30-15h30-18h30-22h30",
   "8H30 - 16H30", "8h–17h" (tiret long), etc.
   Renvoie { creneaux: [{debut,fin}, ...] } ou null si non reconnu. */
function parseHoraire(brut) {
  if (brut===undefined || brut===null) return null;
  let s = String(brut).trim();
  if (!s) return null;
  // normaliser : majuscules + remplacer les tirets longs + retirer le "H" initial éventuel
  let norm = s.toUpperCase().replace(/[–—]/g, "-");
  // retirer un éventuel "H " ou "H" en début (préfixe optionnel)
  norm = norm.replace(/^H\s*/, "");
  // ignorer immédiatement si c'est un code non-horaire connu
  if (NON_HORAIRE.has(norm) || NON_HORAIRE.has(s.toUpperCase())) return null;
  // extraire tous les nombres au format HH ou HHHmm ou HH:MM (avec H ou : comme séparateur)
  // exemples valides : "8", "08", "8H", "8H30", "08:30", "8h30"
  const re = /(\d{1,2})(?:[H:](\d{2}))?/g;
  const nums = [];
  let m;
  while ((m = re.exec(norm)) !== null) {
    const h = parseInt(m[1], 10);
    const min = m[2] ? parseInt(m[2], 10) : 0;
    if (h<0 || h>24 || min<0 || min>59) return null;
    nums.push({ h, min });
  }
  // un horaire valide a 2 nombres (créneau simple) ou 4 nombres (service coupé)
  if (nums.length !== 2 && nums.length !== 4) return null;
  // formater "HH:MM" (24h -> 00:00, sinon zéro-pad)
  const fmt = ({h,min}) => `${String(h===24?0:h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
  const creneaux = [];
  for (let i=0; i<nums.length; i+=2) {
    creneaux.push({ debut:fmt(nums[i]), fin:fmt(nums[i+1]) });
  }
  return { creneaux };
}

let DB = null;

/* ====================================================================
   STOCKAGE : IndexedDB (grande capacité, compatible Safari iPad & autres
   navigateurs) avec repli localStorage. DB reste en MÉMOIRE (le reste de
   l'app est synchrone) ; seule la persistance est asynchrone, en arrière-plan.
   ==================================================================== */
const IDB_NAME = "badgeuse_db", IDB_STORE = "kv", IDB_KEY = "DB";
let _idb = null, _idbKO = false;
function idbOpen() {
  return new Promise((resolve, reject) => {
    if (_idb) return resolve(_idb);
    if (typeof indexedDB === "undefined") { _idbKO = true; return reject(new Error("IndexedDB indisponible")); }
    let req;
    try { req = indexedDB.open(IDB_NAME, 1); } catch(e) { _idbKO = true; return reject(e); }
    req.onupgradeneeded = () => { try { req.result.createObjectStore(IDB_STORE); } catch(_){} };
    req.onsuccess = () => { _idb = req.result; resolve(_idb); };
    req.onerror   = () => { _idbKO = true; reject(req.error); };
  });
}
function idbGet() {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const r = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(IDB_KEY);
    r.onsuccess = () => resolve(r.result);
    r.onerror   = () => reject(r.error);
  }));
}
function idbSet(val) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(val, IDB_KEY);
    tx.oncomplete = () => resolve(true);
    tx.onerror    = () => reject(tx.error || new Error("écriture IndexedDB échouée"));
    tx.onabort    = () => reject(tx.error || new Error("transaction IndexedDB annulée"));
  }));
}

/* Compression de la signature : on réduit la résolution puis on exporte en
   JPEG (fond blanc). De l'ordre de 5 à 10x plus léger qu'un PNG plein écran. */
function compresserSignature(srcCanvas, maxW) {
  maxW = maxW || 380;
  try {
    const sw = srcCanvas.width || maxW, sh = srcCanvas.height || Math.round(maxW/3);
    const ratio = Math.min(1, maxW / sw);
    const w = Math.max(1, Math.round(sw * ratio)), h = Math.max(1, Math.round(sh * ratio));
    const off = document.createElement("canvas"); off.width = w; off.height = h;
    const ctx = off.getContext("2d");
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h);   // JPEG ne gère pas la transparence
    ctx.drawImage(srcCanvas, 0, 0, w, h);
    return off.toDataURL("image/jpeg", 0.6);
  } catch(e) {
    try { return srcCanvas.toDataURL("image/png"); } catch(_) { return ""; } // repli
  }
}

async function loadDB() {
  let loaded = null;

  try { loaded = await idbGet(); } catch(e) { console.warn("Lecture IndexedDB impossible", e); }

  if (!loaded) {

/* Déblocage automatique : à la prochaine 8h00 après le verrouillage.
   Renvoie true si un déblocage vient d'avoir lieu. */
function checkAutoUnlock() {
  if (!DB.security || !DB.security.locked || !DB.security.lockedAt) return false;
  const lock = new Date(DB.security.lockedAt);
  // prochaine occurrence de 8h00 strictement après l'instant de blocage
  const unlockAt = new Date(lock.getFullYear(), lock.getMonth(), lock.getDate(), 8, 0, 0, 0);
  if (unlockAt <= lock) unlockAt.setDate(unlockAt.getDate() + 1); // bloqué après 8h -> 8h le lendemain
  if (Date.now() >= unlockAt.getTime()) {
    DB.security.locked = false;
    DB.security.failCount = 0;
    DB.security.lockedAt = null;
    saveDB();
    logAction("Système", "DÉVERROUILLAGE AUTO", "Déblocage automatique à 8h00");
    return true;
  }
  return false;
}

let _saving = false, _savePending = false;
function saveDB() {
  // Persistance asynchrone en IndexedDB, avec coalescence (une écriture à la fois).
  if (_idbKO) return _saveFallback();
  if (_saving) { _savePending = true; return; }
  _saving = true;
  idbSet(DB).then(() => {
    _saving = false;
    if (_savePending) { _savePending = false; saveDB(); }
  }).catch(() => {
    _saving = false;
    // IndexedDB plein : on allège le journal (dernier recours) puis on retente une fois
    if (DB.journal && DB.journal.length > 1500) {
      DB.journal = DB.journal.slice(0, 1500);
      idbSet(DB)
        .then(() => toast("Mémoire de l'appareil pleine : le journal a été réduit aux 1500 actions les plus récentes pour pouvoir enregistrer. Exportez une sauvegarde (.json) dès que possible.", "err"))
        .catch(() => _saveFallback());
    } else {
      _saveFallback();
    }
  });
}
function _saveFallback() {
  // repli localStorage (petite capacité) si IndexedDB est indisponible
  try { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
  catch(e) {
    toast("Mémoire de l'appareil pleine : enregistrement impossible. Exportez vite une sauvegarde (.json), puis libérez de la place (archiver d'anciens salariés, exporter puis effacer d'anciens mois).", "err");
  }
}

/* ====================================================================
   CALCUL RETARD / BONUS
   Règle : solde global de la journée (minutes), additionné sur tous les créneaux.
   Tolérance ±5 min sur arrivée ET sur départ de chaque créneau.
   Retard = négatif, bonus = positif. Arrondi à la minute.
   ==================================================================== */
function calcSoldeCreneau(prevuDebut, prevuFin, reelIn, reelOut) {
  if (!prevuDebut || !prevuFin || !reelIn || !reelOut) return null;
  let pD = hmToMin(prevuDebut), pF = hmToMin(prevuFin);
  let rD = hmToMin(reelIn),     rF = hmToMin(reelOut);
  const prevuOvernight = pF <= pD;       // service de nuit prévu (fin après minuit)
  if (prevuOvernight) pF += 1440;
  if (rF <= rD) {
    // départ réel avant arrivée : légitime UNIQUEMENT si le service prévu passe minuit.
    // Sinon, c'est une saisie incohérente -> pas de solde (évite un retard/bonus aberrant).
    if (prevuOvernight) rF += 1440; else return null;
  }
  let dArr = pD - rD;   // arrivé avant le prévu => positif (bon)
  let dDep = rF - pF;   // parti après le prévu => positif (bon)
  if (Math.abs(dArr) <= TOLERANCE_MIN) dArr = 0;
  if (Math.abs(dDep) <= TOLERANCE_MIN) dDep = 0;
  return Math.round(dArr + dDep);
}
/* Compat : ancien nom, un seul créneau */
function calcSolde(pd, pf, ri, ro){ return calcSoldeCreneau(pd, pf, ri, ro); }

/* Pauses repas d'un salarié un jour donné, en paires {debut, fin, debutP, finP}.
   La dernière peut avoir fin=null (pause en cours). */
function pausesJour(empId, dateISO) {
  const list = DB.pointages
    .filter(p=>p.empId===empId && p.date===dateISO && (p.type==="pause_start"||p.type==="pause_end"))
    .sort((a,b)=>a.ts-b.ts);
  const pauses = []; let cur = null;
  list.forEach(p=>{
    if (p.type==="pause_start") { cur = { debut:p.time, fin:null, debutP:p, finP:null }; pauses.push(cur); }
    else { if (cur && cur.fin===null) { cur.fin=p.time; cur.finP=p; } }
  });
  return pauses;
}
/* Total des minutes de pause (terminées) d'un jour */
function tempsPauseMin(empId, dateISO) {
  let total = 0;
  pausesJour(empId, dateISO).forEach(p=>{
    if (p.debut && p.fin) {
      let a = hmToMin(p.debut), b = hmToMin(p.fin);
      if (b < a) b += 1440; // pause à cheval sur minuit (service de nuit)
      const dur = b - a;
      if (dur >= 0 && dur <= 8*60) total += dur; // ignore une durée aberrante (saisie incohérente)
    }
  });
  return total;
}
/* Y a-t-il une pause en cours (non terminée) ? renvoie l'objet pause ou null */
function pauseEnCours(empId, dateISO) {
  return pausesJour(empId, dateISO).find(p=>p.fin===null) || null;
}

/* Heure de fin PRÉVUE du service actuellement en cours pour ce salarié (HH:MM) ou null.
   Sert d'anti-abus : une pause ne peut pas dépasser la fin du service prévu. */
function finServiceEnCours(empId, dateISO) {
  const paires = pairesJour(empId, dateISO);
  const idxOuvert = paires.findIndex(p=>p.in && !p.out); // service en cours
  if (idxOuvert === -1) return null;
  const prevu = getPrevu(empId, dateISO);
  if (!prevu || !prevu.creneaux || !prevu.creneaux[idxOuvert]) return null;
  return prevu.creneaux[idxOuvert].fin;
}

/* Pause repas : le service d'indice idx est-il marqué "travaillé" (30 min comptées comme travaillées) ? */
function pauseTravaillee(empId, dateISO, idx) {
  const a = DB.pauseRepas && DB.pauseRepas[dateISO] && DB.pauseRepas[dateISO][empId];
  if (a && typeof a[idx] === "boolean") return a[idx];   // annotation explicite du jour : prioritaire
  return pauseAutoActif(empId, dateISO);                 // sinon : réglage durable "ne prend pas ses pauses"
}
/* Réglage durable "ne prend pas ses pauses" : la date est-elle couverte par une période active ? */
function pauseAutoActif(empId, dateISO) {
  const periods = DB.pauseAuto && DB.pauseAuto[empId];
  if (!periods || !periods.length) return false;
  return periods.some(p => dateISO >= p.from && (p.to === null || dateISO < p.to));
}
/* Le réglage durable est-il actif en ce moment (dernière période ouverte) ? */
function pauseAutoActifMaintenant(empId) {
  const periods = DB.pauseAuto && DB.pauseAuto[empId];
  return !!(periods && periods.length && periods[periods.length-1].to === null);
}
/* Durée brute d'UN service en minutes, robuste à l'heure d'été et au passage minuit.
   - Voie HORODATAGE RÉEL : si les deux pointages portent un ts réel cohérent
     (out après in, durée plausible), on mesure l'écart réel (out.ts - in.ts).
     C'est exact même lors d'un changement d'heure (été/hiver) et pour un service
     de nuit badgé en direct (le ts du départ est bien le lendemain).
   - Voie HORLOGE (repli) : pour les pointages reconstitués (clôture auto, édition
     manuelle) dont le ts est fabriqué à partir de date+heure, on calcule sur HH:MM
     avec passage minuit CONDITIONNEL : on n'ajoute 24 h que si le créneau PRÉVU
     passe minuit, ou s'il n'y a pas de prévu (renfort/extra). Un départ avant
     l'arrivée sur un service de jour normal = saisie incohérente -> durée nulle.
   - Dans tous les cas, une durée > MAX_SERVICE_MIN est jugée aberrante -> 0. */
function dureeServiceMin(p, cr) {
  if (!p || !p.in || !p.out) return 0;
  const tIn  = p.inP  && typeof p.inP.ts  === "number" ? p.inP.ts  : null;
  const tOut = p.outP && typeof p.outP.ts === "number" ? p.outP.ts : null;
  if (tIn !== null && tOut !== null && tOut > tIn) {
    const min = Math.round((tOut - tIn) / 60000);
    if (min >= 0 && min <= MAX_SERVICE_MIN) return min; // mesure réelle fiable
    // sinon (ts incohérent / fabriqué) : on bascule sur la voie horloge ci-dessous
  }
  let a = hmToMin(p.in), b = hmToMin(p.out);
  if (b < a) {
    const overnightPrevu  = cr && cr.debut && cr.fin && hmToMin(cr.fin) <= hmToMin(cr.debut);
    const overnightSansPrevu = !cr; // renfort/extra sans horaire : passage minuit autorisé
    if (overnightPrevu || overnightSansPrevu) b += 1440;
    else return 0; // jour normal + départ avant arrivée = incohérent
  }
  const dur = b - a;
  return (dur >= 0 && dur <= MAX_SERVICE_MIN) ? dur : 0;
}
/* Durée réelle travaillée (minutes) = présence − forfait pause repas (30 min par service,
   SAUF pour les services marqués "travaillés" par le manager/la direction). */
function tempsTravailleMin(paires, empId, dateISO) {
  const prevu = (empId && dateISO) ? getPrevu(empId, dateISO) : null;
  let total = 0;
  paires.forEach((p, idx)=>{
    if (p.in && p.out) {
      const cr = prevu && prevu.creneaux ? prevu.creneaux[idx] : null;
      let dur = dureeServiceMin(p, cr); // gère heure d'été + passage minuit + aberrations
      if (dur <= 0) return;
      // Arrivée EN AVANCE non comptée : le décompte démarre au plus tôt à l'heure prévue.
      if (cr && cr.debut) {
        const aWall  = hmToMin(p.in);
        let   bWall  = hmToMin(p.out); if (bWall < aWall) bWall += 1440;
        const planA  = hmToMin(cr.debut);
        if (planA > aWall && planA <= bWall) {
          dur -= Math.min(planA - aWall, dur); // surplus avant l'heure prévue ignoré
        }
      }
      // forfait : 30 min déduites par service, sauf si la pause est marquée "travaillée"
      if (empId && dateISO && !pauseTravaillee(empId, dateISO, idx)) {
        dur -= Math.min(PAUSE_REPAS_MIN, dur);
      }
      total += Math.max(0, dur);
    }
  });
  return Math.max(0, total);
}
/* Nombre de minutes de pause repas déduites sur la journée (pour affichage) */
function pauseForfaitMin(empId, dateISO) {
  const prevu = getPrevu(empId, dateISO);
  let ded = 0;
  pairesJour(empId, dateISO).forEach((p, idx)=>{
    if (p.in && p.out && !pauseTravaillee(empId, dateISO, idx)) {
      const cr = prevu && prevu.creneaux ? prevu.creneaux[idx] : null;
      const dur = dureeServiceMin(p, cr);
      if (dur > 0) ded += Math.min(PAUSE_REPAS_MIN, dur);
    }
  });
  return ded;
}

/* Solde du jour = somme des soldes de chaque créneau prévu, comparé au créneau réel correspondant.
   prevu = { creneaux:[{debut,fin}, ...] } ; paires = [{in,out}, ...] (réelles, ordre chronologique)
   Renvoie null si pas de prévu (renfort/extra/manager) ou si aucun créneau réel complet. */
function calcSoldeJour(prevu, paires) {
  if (!prevu || !prevu.creneaux || !prevu.creneaux.length) return null;
  const completes = paires.filter(p=>p.in && p.out);
  if (!completes.length) return null;
  let solde = 0, comptes = 0;
  // on apparie créneau prévu i avec créneau réel i (dans l'ordre)
  prevu.creneaux.forEach((cr, i)=>{
    const reel = completes[i];
    if (reel) {
      const s = calcSoldeCreneau(cr.debut, cr.fin, reel.in, reel.out);
      if (s!==null){ solde += s; comptes++; }
    }
  });
  return comptes ? solde : null;
}

/* Renvoie l'horaire prévu d'un salarié pour une date (créneaux). */
function getPrevu(empId, dateISO) {
  // Le Manager pointe (présence) mais n'a pas de calcul retard/bonus
  const e = DB.team.find(t=>t.id===empId);
  if (e && e.access==="manager") return null;
  const p = DB.planning[dateISO];
  if (p && p[empId]) return p[empId];
  // Un renfort/extra imprévu n'a pas d'horaire de référence -> pas de calcul
  return null;
}
/* Un salarié est-il un renfort imprévu ce jour-là ? */
function estRenfort(empId, dateISO) {
  return !!(DB.renforts[dateISO] && DB.renforts[dateISO][empId]);
}
/* Un salarié a-t-il été marqué absent (par la gestion) ce jour-là ? */
function estAbsent(empId, dateISO) {
  return !!(DB.absences && DB.absences[dateISO] && DB.absences[dateISO][empId]);
}
/* Type de statut posé : "absent" | "maladie" | null */
function typeAbsence(empId, dateISO) {
  const a = DB.absences && DB.absences[dateISO] && DB.absences[dateISO][empId];
  return a ? (a.type || "absent") : null;
}

/* POINT B — Le badgeage est-il devenu impossible pour ce salarié aujourd'hui ?
   Vrai si : pas de service en cours, et tous les créneaux prévus encore "à faire"
   ont leur heure de fin déjà dépassée. Dans ce cas, seule la Direction régularise.
   (Renfort/extra : jamais bloqués, ils n'ont pas d'horaire de référence.) */
function badgeageBloque(empId, dateISO) {
  // ne s'applique qu'au jour en cours
  if (dateISO !== App.currentDate) return false;
  if (estRenfort(empId, dateISO) || estExtra(empId, dateISO)) return false;
  const prevu = getPrevu(empId, dateISO);
  if (!prevu || !prevu.creneaux) return false; // pas d'horaire de référence (ex. manager)
  const paires = pairesJour(empId, dateISO);
  // si un service est en cours, on peut toujours pointer le départ
  if (paires.some(p=>p.in && !p.out)) return false;
  const nbFaits = paires.filter(p=>p.in && p.out).length;
  // créneaux restant à faire
  const restants = prevu.creneaux.slice(nbFaits);
  if (!restants.length) return false; // tout fait
  const maintenant = hmToMin(nowHM());
  // s'il existe au moins un créneau restant dont la fin n'est pas encore passée -> badgeage possible
  const encorePossible = restants.some(cr=>{
    let fin = hmToMin(cr.fin);
    if (fin < hmToMin(cr.debut)) fin += 1440; // fin après minuit
    return maintenant <= fin;
  });
  return !encorePossible; // bloqué si plus aucun créneau atteignable
}

/* Liste des salariés "prévus" un jour donné (planning + renforts activés) */
function prevusDuJour(dateISO) {
  const ids = new Set();
  if (DB.planning[dateISO]) Object.keys(DB.planning[dateISO]).forEach(id=>ids.add(id));
  if (DB.renforts[dateISO]) Object.keys(DB.renforts[dateISO]).forEach(id=>ids.add(id));
  if (DB.extras[dateISO])   Object.keys(DB.extras[dateISO]).forEach(id=>ids.add(id));
  return [...ids];
}

/* RÈGLE 3 — Clôture des départs oubliés pour une journée terminée.
   Pour chaque service laissé ouvert (arrivée sans départ) :
   - salarié avec planning  -> départ = heure de fin du créneau correspondant
   - renfort / extra / manager (pas d'horaire) -> laissé vide (correction manuelle)
   Retourne le nombre de départs complétés automatiquement. */
function cloturerDepartsOublies(dateISO) {
  let complétés = 0;
  // 0) Clôturer d'abord toute PAUSE restée ouverte (cap à la fin de service prévue si connue)
  const idsPause = [...new Set(DB.pointages.filter(p=>p.date===dateISO && p.type==="pause_start").map(p=>p.empId))];
  idsPause.forEach(id=>{
    const p = pauseEnCours(id, dateISO);
    if (!p) return;
    // heure de fin = fin du service en cours prévu, sinon l'heure de début de pause (durée nulle, prudent)
    const paires = pairesJour(id, dateISO);
    const idxOuvert = paires.findIndex(pr=>pr.in && !pr.out);
    const planif = DB.planning[dateISO] && DB.planning[dateISO][id];
    let finP = (planif && planif.creneaux && idxOuvert>=0 && planif.creneaux[idxOuvert]) ? planif.creneaux[idxOuvert].fin : p.debut;
    const [h,m] = finP.split(":").map(Number);
    const [y,mo,d] = dateISO.split("-").map(Number);
    const ts = new Date(y,mo-1,d,h,m).getTime();
    DB.pointages.push({ id:"pe"+Date.now()+Math.random().toString(36).slice(2,5), empId:id, date:dateISO, type:"pause_end", time:finP, ts, auto:true });
    const e = emp(id);
    logAction("Système", "Fin pause repas (auto)", `${e?e.nom:id} — ${dateISO} : pause clôturée à ${finP} (clôture de journée)`);
  });
  const ids = [...new Set(DB.pointages.filter(p=>p.date===dateISO).map(p=>p.empId))];
  ids.forEach(id=>{
    const paires = pairesJour(id, dateISO);
    // index du service ouvert (arrivée sans départ)
    const idxOuvert = paires.findIndex(p=>p.in && !p.out);
    if (idxOuvert === -1) return; // rien d'ouvert
    const planif = DB.planning[dateISO] && DB.planning[dateISO][id];
    const cr = planif && planif.creneaux ? planif.creneaux[idxOuvert] : null;
    if (cr && cr.fin) {
      const [h,m] = cr.fin.split(":").map(Number);
      const [y,mo,d] = dateISO.split("-").map(Number);
      const ts = new Date(y,mo-1,d,h,m).getTime();
      DB.pointages.push({
        id:"auto"+Date.now()+Math.random().toString(36).slice(2,5),
        empId:id, date:dateISO, type:"out", time:cr.fin, ts,
        signature:"", auto:true
      });
      complétés++;
      const e = DB.team.find(t=>t.id===id);
      logAction("Système", "Départ complété (oubli)",
        `${e?e.nom:id} — ${dateISO} : départ du service ${idxOuvert+1} fixé à ${cr.fin} (fin prévue)`);
    } else {
      const e = emp(id);
      logAction("Système", "Départ manquant à corriger",
        `${e?e.nom:id} — ${dateISO} : service sans départ, à corriger manuellement`);
    }
  });
  if (complétés) saveDB();
  return complétés;
}

/* POINT A — Repère les salariés PRÉVUS au planning mais sans AUCUN pointage ce jour.
   Les marque "à vérifier" (DB.aVerifier) et les journalise. */
function detecterAbsences(dateISO) {
  const planif = DB.planning[dateISO];
  if (!planif) return 0;
  DB.aVerifier = DB.aVerifier || {};
  let nb = 0;
  Object.keys(planif).forEach(id=>{
    const e = DB.team.find(t=>t.id===id);
    if (e && e.access==="manager") return; // le manager n'est pas concerné par le solde
    const aPointe = DB.pointages.some(p=>p.empId===id && p.date===dateISO);
    if (!aPointe) {
      if (!DB.aVerifier[dateISO]) DB.aVerifier[dateISO] = {};
      if (!DB.aVerifier[dateISO][id]) {
        DB.aVerifier[dateISO][id] = { statut:"a_verifier", at:Date.now() };
        nb++;
        logAction("Système", "Absence à vérifier",
          `${e?e.nom:id} — ${dateISO} : prévu au planning mais aucun pointage. À trancher par la Direction.`);
      }
    }
  });
  if (nb) saveDB();
  return nb;
}

/* Rattrapage : clôture toutes les journées terminées depuis le dernier passage.
   Couvre le cas où la tablette est restée éteinte plusieurs jours. */
function cloturerJoursEcoules(jourActuel) {
  const last = DB.lastBusinessDay;
  // jours à clôturer = toutes les dates de pointage strictement avant le jour actuel
  // qui ont une arrivée sans départ
  const datesAvant = [...new Set([...DB.pointages.map(p=>p.date), ...Object.keys(DB.planning||{})])].filter(dt=>dt < jourActuel);
  datesAvant.forEach(dt=>{ cloturerDepartsOublies(dt); detecterAbsences(dt); });
  DB.lastBusinessDay = jourActuel;
  saveDB();
}

/* APRÈS IMPORT : sur les dates passées présentes dans le planning, lancer la
   détection d'absences et la clôture des départs oubliés (sinon aucun flag
   n'apparaît pour des jours déjà écoulés ajoutés via l'import). */
function rattraperImport(jourActuel) {
  const datesPassees = Object.keys(DB.planning||{}).filter(dt=>dt < jourActuel);
  let flags = 0;
  datesPassees.forEach(dt=>{ cloturerDepartsOublies(dt); flags += detecterAbsences(dt); });
  saveDB();
  return flags;
}

/* Tous les pointages d'un salarié un jour donné, en ordre chronologique */
function pointagesDuJour(empId, dateISO) {
  return DB.pointages.filter(p=>p.empId===empId && p.date===dateISO).sort((a,b)=>a.ts-b.ts);
}
/* Reconstitue les paires arrivée/départ d'une journée (gère les services coupés).
   Renvoie [{in, out, inP, outP}, ...] ; le dernier peut avoir out=null (service en cours). */
function pairesJour(empId, dateISO) {
  const list = pointagesDuJour(empId, dateISO).filter(p=>p.type==="in" || p.type==="out");
  const paires = [];
  let cur = null;
  list.forEach(p=>{
    if (p.type==="in") {
      if (cur && cur.out===null) { /* deux arrivées de suite : on garde la 1re */ return; }
      cur = { in:p.time, out:null, inP:p, outP:null };
      paires.push(cur);
    } else { // out
      if (cur && cur.out===null) { cur.out=p.time; cur.outP=p; }
      else { paires.push({ in:null, out:p.time, inP:null, outP:p }); } // départ orphelin
    }
  });
  return paires;
}
/* Compat : 1re arrivée / dernier départ de la journée */
function pointagesJour(empId, dateISO) {
  const list = DB.pointages.filter(p=>p.empId===empId && p.date===dateISO);
  const inP  = list.filter(p=>p.type==="in").sort((a,b)=>a.ts-b.ts)[0] || null;
  const outP = list.filter(p=>p.type==="out").sort((a,b)=>b.ts-a.ts)[0] || null;
  return { inP, outP };
}
/* Statut du jour en tenant compte des services prévus (coupures).
   - "await" : rien pointé
   - "in"    : un service en cours (arrivée sans départ)
   - "pause" : tous les services pointés jusque-là sont terminés, mais il en reste à faire
   - "done"  : tous les services prévus sont faits */
function statutJour(empId, dateISO) {
  const paires = pairesJour(empId, dateISO);
  if (!paires.length) return "await";
  const enCours = paires.some(p=>p.in && !p.out);
  if (enCours) return "in";
  // tous les créneaux pointés sont terminés : reste-t-il des services prévus ?
  const prevu = getPrevu(empId, dateISO);
  const nbPrevus = prevu && prevu.creneaux ? prevu.creneaux.length : 1;
  const nbFaits = paires.filter(p=>p.in && p.out).length;
  if (nbFaits < nbPrevus) return "pause"; // coupure : il reste un service à venir
  return "done";
}

  debutPause(empId) {

    if (pauseEnCours(empId, date)) { toast("Une pause est déjà en cours.", "err"); return; }
    const now = new Date();
    DB.pointages.push({
      id:"ps"+Date.now()+Math.random().toString(36).slice(2,5),

  finPause(empId, opts) {
    opts = opts||{};
    const e = emp(empId);
    const date = this.currentDate;
    const p = pauseEnCours(empId, date);
    if (!p) return;
    const now = new Date();
    const heureFin = opts.heure || nowHM(now);
    const tsFin = opts.ts || now.getTime();
    DB.pointages.push({
      id:"pe"+Date.now()+Math.random().toString(36).slice(2,5),
      empId, date, type:"pause_end", time:heureFin, ts:tsFin, auto:!!opts.auto
    });
    // calcul durée
    let debut = hmToMin(p.debut), fin = hmToMin(heureFin);
    if (fin < debut) fin += 1440;
    const duree = fin - debut;
    saveDB();
    logAction(e.nom, opts.auto?"Fin pause repas (auto)":"Fin pause repas",
      `${date} : ${p.debut} → ${heureFin} (${duree} min déduites)${opts.auto?" — clôture automatique":""}`);
    if (!opts.silent) toast(`${e.nom} — fin de pause (${duree} min).`, "ok");
    this.renderBadge();
  },
  /* ANTI-ABUS : clôture toute pause en cours dont l'heure de fin de service prévue
     est dépassée. La pause est arrêtée à l'heure de fin du service (pas plus tard).
     Appelée périodiquement (tickClock). Renvoie true si au moins une pause a été clôturée. */
  cloturerPausesDepassees() {
    const date = this.currentDate;
    let fait = false;
    prevusDuJour(date).forEach(id=>{
      const p = pauseEnCours(id, date);
      if (!p) return;
      const finPrev = finServiceEnCours(id, date); // HH:MM ou null
      if (!finPrev) return;
      const now = hmToMin(nowHM());
      let finMin = hmToMin(finPrev);
      // gérer fin après minuit : si la fin prévue est "avant" le début de pause, +1 jour
      let debutPMin = hmToMin(p.debut);
      let finCmp = finMin; if (finCmp < debutPMin) finCmp += 1440;
      let nowCmp = now;    if (nowCmp < debutPMin) nowCmp += 1440;
      if (nowCmp >= finCmp) {
        // la fin de service prévue est atteinte/dépassée -> clôturer la pause À l'heure de fin prévue
        const [h,m] = finPrev.split(":").map(Number);
        const [y,mo,d] = date.split("-").map(Number);
        let ts = new Date(y,mo-1,d,h,m).getTime();
        this.finPause(id, { heure:finPrev, ts, auto:true, silent:true });
        fait = true;
      }
    });
    return fait;
  },

  /* ---------- SIGNATURE ---------- */
  askSignature(e) {
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>Signature</h3>
      <div class="modal-sub">${e.nom} — ${this.badgeAction==='in'?'arrivée':'départ'} à ${nowHM()}. Signez ci-dessous pour valider.</div>
      <div class="sig-wrap">
        <canvas id="sigCanvas"></canvas>
        <div class="sig-hint" id="sigHint">✍️ Signez ici avec le doigt ou la souris</div>
      </div>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="App.clearSig()">Effacer</button>
        <button class="btn btn-green" onclick="App.confirmBadge()">Valider le pointage</button>
      </div>`);
    setTimeout(()=>this.initSig(), 60);
  },
  initSig() {
    const c = document.getElementById("sigCanvas");
    if (!c) return;
    const rect = c.getBoundingClientRect();
    c.width = rect.width * 2; c.height = rect.height * 2;
    const ctx = c.getContext("2d");
    ctx.scale(2,2); ctx.lineWidth = 2.2; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#1a2238";
    this.sig = { canvas:c, ctx, drawing:false, dirty:false };
    const pos = ev => {
      const r = c.getBoundingClientRect();
      const t = ev.touches ? ev.touches[0] : ev;
      return { x:t.clientX-r.left, y:t.clientY-r.top };
    };
    const start = ev => { ev.preventDefault(); this.sig.drawing=true; const p=pos(ev); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    const move  = ev => { if(!this.sig.drawing) return; ev.preventDefault(); const p=pos(ev); ctx.lineTo(p.x,p.y); ctx.stroke(); this.sig.dirty=true; const h=document.getElementById("sigHint"); if(h)h.style.display="none"; };
    const end   = () => { this.sig.drawing=false; };
    c.addEventListener("mousedown",start); c.addEventListener("mousemove",move); window.addEventListener("mouseup",end);
    c.addEventListener("touchstart",start,{passive:false}); c.addEventListener("touchmove",move,{passive:false}); c.addEventListener("touchend",end);
  },
  clearSig() {
    if (!this.sig.ctx) return;
    this.sig.ctx.clearRect(0,0,this.sig.canvas.width,this.sig.canvas.height);
    this.sig.dirty=false;
    const h=document.getElementById("sigHint"); if(h)h.style.display="grid";
  },
  confirmBadge() {
    if (!this.sig.dirty) { toast("Merci de signer avant de valider.", "err"); return; }
    const e = emp(this.badgeTarget);
    const now = new Date();
    const hm = nowHM(now);
    // Anti-doublon : un départ ne peut pas être pointé à la même minute que l'arrivée du service en cours
    if (this.badgeAction==="out") {
      const ouvert = pairesJour(this.badgeTarget, this.currentDate).find(p=>p.in && !p.out);
      if (ouvert && ouvert.in === hm) {
        toast("Arrivée et départ à la même minute : patientez au moins une minute avant de pointer le départ.", "err");
        return;
      }
    }
    const sigData = compresserSignature(this.sig.canvas);
    // Si on pointe le DÉPART alors qu'une pause est encore ouverte -> clôturer la pause à l'heure du départ
    if (this.badgeAction==="out" && pauseEnCours(this.badgeTarget, this.currentDate)) {
      this.finPause(this.badgeTarget, { heure:hm, ts:now.getTime(), auto:true, silent:true });
    }
    DB.pointages.push({
      id: "p"+Date.now(),
      empId: this.badgeTarget,
      date: this.currentDate,
      type: this.badgeAction,
      time: hm,
      ts: now.getTime(),
      signature: sigData
    });
    // si la personne avait été marquée absente mais badge finalement, on lève l'absence
    if (DB.absences && DB.absences[this.currentDate] && DB.absences[this.currentDate][this.badgeTarget]) {
      delete DB.absences[this.currentDate][this.badgeTarget];
    }
    saveDB();
    closeModal();
    toast(`✅ ${e.nom} — ${this.badgeAction==='in'?'arrivée':'départ'} enregistré à ${nowHM(now)}`, "ok");
    this.renderBadge();
  },

  /* échec de connexion : incrémente, et verrouille si seuil atteint */
  onLoginFail(a) {
    DB.security.failCount = (DB.security.failCount||0) + 1;
    const restantes = DB.settings.maxTries - DB.security.failCount;
    logAction(a?a.nom:"(inconnu)", "Code gestion incorrect", `Tentative ${DB.security.failCount}/${DB.settings.maxTries}`);
    if (DB.security.failCount >= DB.settings.maxTries) {
      DB.security.locked = true;
      DB.security.lockedAt = Date.now();
      saveDB();
      logAction("Système", "VERROUILLAGE", `Bloqué après ${DB.settings.maxTries} tentatives incorrectes`);
      this.notifyLock();
      this.renderAdminLogin();
      toast("Système verrouillé. Contactez la Direction.", "err");
    } else {
      saveDB();
      toast(`Code incorrect. ${restantes} tentative(s) restante(s).`, "err");
    }
  },

  unlockPrompt() {
    const dir = DB.team.find(e=>e.access==="dirigeant");

      DB.security.locked = false; DB.security.failCount = 0; DB.security.lockedAt = null;
      saveDB();
      logAction(dir.nom, "DÉVERROUILLAGE", "Système débloqué par la Direction");
      toast("Système débloqué.", "ok");
      this.renderAdminLogin();

      </div>`);
  },
  /* notification de verrouillage : EmailJS si configuré + internet, sinon journal seul */
  notifyLock() {
    const s = DB.settings;
    const when = new Date().toLocaleString("fr-FR");
    const subject = "⚠️ Badgeuse — tentatives d'accès à l'espace gestion";
    const body = `Le système de badgeage a été VERROUILLÉ le ${when} après ${s.maxTries} tentatives de code incorrectes sur l'espace gestion.\n\nIl se débloquera automatiquement demain à 8h00, ou immédiatement avec le code Direction sur la tablette.`;
    const cfg = s.emailjs || {};
    const online = (typeof navigator==="undefined") ? true : navigator.onLine;
    const canAuto = window.emailjs && online && cfg.serviceId && cfg.templateId && cfg.publicKey && s.alertEmail;
    if (canAuto) {
      try {
        window.emailjs.init({ publicKey: cfg.publicKey });
        window.emailjs.send(cfg.serviceId, cfg.templateId, {
          to_email: s.alertEmail, subject, message: body, when, tries: s.maxTries
        }).then(()=>{
          logAction("Système", "Mail d'alerte envoyé", `À ${s.alertEmail}`);
        }).catch(err=>{
          logAction("Système", "Mail non envoyé (erreur réseau)", "Alerte conservée au journal");
        });
      } catch(e) {
        logAction("Système", "Mail non envoyé", "Alerte conservée au journal");
      }
    } else {
      // Pas d'internet ou non configuré : on consigne uniquement dans le journal
      logAction("Système", "Alerte non envoyée (hors ligne ou non configuré)", "Verrouillage consigné au journal");
    }
  },

  /* ---------- RAPPEL DE SAUVEGARDE MENSUELLE ----------

     complète n'a été faite ce mois-ci, on affiche un rappel à la Direction/au Manager. */
  rappelSauvegardeDue() {
    const moisActuel = todayISO().slice(0,7); // AAAA-MM
    return DB.lastBackupMonth !== moisActuel;
  },
  verifierRappelSauvegarde() {
    if (this.rappelSauvegardeDue()) {
      // on journalise une seule fois par mois le fait que la sauvegarde est due
      const moisActuel = todayISO().slice(0,7);
      if (DB._rappelLogMonth !== moisActuel) {
        DB._rappelLogMonth = moisActuel;
        logAction("Système", "Rappel sauvegarde", `Sauvegarde mensuelle non encore effectuée pour ${moisActuel}`);
        saveDB();
      }
    }
  },

  /* ----- onglet AUJOURD'HUI : pointages du jour + édition ----- */
  jourConsulte: null,
  tabJour(c) {
    if (!this.jourConsulte) this.jourConsulte = this.currentDate;
    const date = this.jourConsulte;
    const prevus = prevusDuJour(date);
    let rows = "";
    prevus.forEach(id=>{
      const e = emp(id); if(!e) return;
      const paires = pairesJour(id, date);
      const prevu = getPrevu(id, date);
      const renfort = estRenfort(id, date);
      const extra = estExtra(id, date);
      const isMgr = e.access==="manager";
      const solde = calcSoldeJour(prevu, paires);
      // Label "Prévu" : liste des créneaux, ou statut spécial
      let prevuLabel;
      if (prevu && prevu.creneaux) {
        prevuLabel = prevu.creneaux.map(cr=>`${cr.debut}→${cr.fin}`).join('<br>');
      } else if (isMgr) prevuLabel = '<span style="color:var(--ink-soft)">Présence</span>';
      else if (renfort) prevuLabel = '<span style="color:var(--accent-2)">Renfort</span>';
      else if (extra)   prevuLabel = '<span style="color:var(--blue)">Extra</span>';
      else prevuLabel = '—';
      // Réel : liste des créneaux pointés
      const statut = typeAbsence(id, date);   // "absent" | "maladie" | null
      const absent = !!statut;
      const aVerif = DB.aVerifier && DB.aVerifier[date] && DB.aVerifier[date][id] && !paires.length && !absent;
      const bloque = badgeageBloque(id, date) && !absent;
      let reelLabel;
      if (paires.length) {
        reelLabel = paires.map(p=>`${p.in||'—'} → ${p.out||'<span style="color:var(--ink-dim)">en cours</span>'}`).join('<br>');
      } else if (statut==="maladie") {
        reelLabel = '<span style="color:#e8556b;font-weight:600">🤒 Arrêt maladie</span>';
      } else if (statut==="absent") {
        reelLabel = '<span style="color:#e8556b;font-weight:600">🚫 Absent</span>';
      } else if (aVerif) {
        reelLabel = '<span style="color:#e8556b;font-weight:600">⚠️ Absence à vérifier</span>';
      } else if (bloque) {
        reelLabel = '<span style="color:#e8556b;font-weight:600">⛔ Non pointé — à régulariser</span>';
      } else {
        reelLabel = '<span style="color:var(--ink-dim)">—</span>';
      }
      // temps travaillé (pauses déduites) — 0 si absent
      const tt = absent ? 0 : tempsTravailleMin(paires, id, date);
      const ttLabel = absent ? '0h00' : (tt>0 ? `${Math.floor(tt/60)}h${String(tt%60).padStart(2,'0')}` : '—');
      // pause repas (forfait) : minutes déduites ce jour + détail par service
      const nbServices = paires.filter(p=>p.in&&p.out).length;
      const pauseDed = absent ? 0 : pauseForfaitMin(id, date);
      let pauseLabel;
      if (absent || !nbServices) pauseLabel = '—';
      else {
        const nbTrav = paires.filter((p,i)=>p.in&&p.out&&pauseTravaillee(id,date,i)).length;
        if (pauseDed>0 && nbTrav>0) pauseLabel = `−${pauseDed} min <span style="color:var(--ink-dim)">(${nbTrav} travaillée${nbTrav>1?'s':''})</span>`;
        else if (pauseDed>0) pauseLabel = `−${pauseDed} min`;
        else pauseLabel = '<span style="color:var(--ink-soft)">travaillée</span>';
      }
      // signature : on prend la 1re disponible
      const sig = paires.find(p=>p.inP&&p.inP.signature)?.inP.signature
                || paires.find(p=>p.outP&&p.outP.signature)?.outP.signature || '';
      const rowStyle = absent ? ' style="background:rgba(155,167,196,.08)"' : ((aVerif||bloque) ? ' style="background:rgba(232,85,107,.07)"' : '');
      // ponctualité : 0 si absent, sinon le solde calculé
      const soldeAff = absent ? '<span class="badge-delta delta-ok">0</span>' : this.soldeBadge(solde);
      // boutons d'action
      let actions;
      if (absent) {
        actions = `<button class="btn btn-ghost btn-sm" onclick="App.annulerAbsence('${id}')">Annuler</button>`;
      } else {
        const btnMod = `<button class="btn btn-ghost btn-sm" onclick="App.editPointage('${id}')">${(aVerif||bloque)?'Régulariser':'Modifier'}</button>`;
        const btnAbs = !paires.length ? `<button class="btn btn-ghost btn-sm" style="color:#e8556b" onclick="App.marquerAbsent('${id}')">Absent</button>` : '';
        const btnMal = !paires.length ? `<button class="btn btn-ghost btn-sm" style="color:#e8556b" onclick="App.marquerMaladie('${id}')">Arrêt maladie</button>` : '';
        actions = `<div class="row" style="gap:6px;justify-content:flex-end;flex-wrap:wrap">${btnMod}${btnAbs}${btnMal}</div>`;
      }
      const com = DB.commentaires && DB.commentaires[date] && DB.commentaires[date][id];
      const comTag = com ? ` <span title="${(com.texte||'').replace(/"/g,'&quot;')}" style="cursor:help">💬</span>` : '';
      rows += `<tr${rowStyle}>
        <td>${e.nom}${comTag}<div style="color:var(--ink-soft);font-size:.78rem">${e.role}</div></td>
        <td class="num" style="font-size:.82rem">${prevuLabel}</td>
        <td class="num" style="font-size:.82rem">${reelLabel}</td>

      `<div class="day-banner" style="border-color:rgba(240,168,48,.4);background:rgba(240,168,48,.08)">

    c.innerHTML = `${selecteur}${bandeau}` + (prevus.length ? `

  },
  /* ----- PAUSES REPAS (forfait 30 min/service, géré par jour) ----- */
  gererPausesRepas() {
    const date = this.jourConsulte || this.currentDate;
    if (date > this.currentDate) { toast("Les pauses ne se gèrent pas pour un jour futur.", "err"); return; }
    // construire la liste (salarié × service) pour les salariés ayant des services ce jour-là
    const lignes = [];
    prevusDuJour(date).concat([...new Set(DB.pointages.filter(p=>p.date===date).map(p=>p.empId))])
      .filter((v,i,a)=>a.indexOf(v)===i).forEach(id=>{
        const e = emp(id); if (!e || e.archived) return;
        if (estAbsent(id, date)) return; // absent : pas de pause
        const paires = pairesJour(id, date).filter(p=>p.in&&p.out);
        paires.forEach((p, idx)=>{
          lignes.push({ id, nom:e.nom, idx, creneau:`${p.in}–${p.out}`,
            coche: pauseTravaillee(id, date, idx) }); // reflète l'annotation du jour OU le réglage durable
        });
      });
    if (!lignes.length) { toast("Aucun service terminé à traiter ce jour-là.", "err"); return; }
    const rows = lignes.map((l,i)=>`
      <label style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);cursor:pointer">
        <input type="checkbox" class="pauseChk" data-id="${l.id}" data-idx="${l.idx}" ${l.coche?'checked':''} style="width:18px;height:18px;flex:none">
        <span style="flex:1">${l.nom}<span style="color:var(--ink-soft);font-size:.8rem"> · ${l.creneau}</span></span>
      </label>`).join("");
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>🍽️ Pauses repas — ${frDate(date)}</h3>
      <div class="modal-sub">Forfait : <b>30 min déduites par service</b> par défaut. <b>Cochez</b> les salariés qui ont <b>travaillé pendant leur pause</b> (30 min comptées comme travaillées) ; <b>décochez</b> ceux qui ont <b>pris leur pause</b>. Les salariés en réglage <b>« sans pause »</b> sont déjà cochés.</div>
      <div class="row mb" style="gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.pauseChk').forEach(c=>c.checked=true)">Tout cocher</button>
        <button class="btn btn-ghost btn-sm" onclick="document.querySelectorAll('.pauseChk').forEach(c=>c.checked=false)">Tout décocher</button>
      </div>
      <div class="table-card" style="max-height:46vh;overflow:auto;padding:4px 12px">${rows}</div>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="App.validerPausesRepas('${date}')">Valider</button>
      </div>`);
  },
  validerPausesRepas(date) {
    if (date > this.currentDate) { toast("Jour futur impossible.", "err"); return; }
    const chks = document.querySelectorAll(".pauseChk");
    let nbTrav = 0, nbDed = 0;
    chks.forEach(c=>{
      const id = c.getAttribute("data-id"), idx = parseInt(c.getAttribute("data-idx"));
      const auto = pauseAutoActif(id, date); // état dicté par le réglage durable (ou défaut déduit)
      if (c.checked === auto) {
        // identique au réglage durable / défaut -> pas d'annotation explicite (le réglage reste maître)
        if (DB.pauseRepas[date] && DB.pauseRepas[date][id]) delete DB.pauseRepas[date][id][idx];
      } else {
        // exception du jour -> on enregistre l'annotation explicite (prioritaire)
        if (!DB.pauseRepas[date]) DB.pauseRepas[date] = {};
        if (!DB.pauseRepas[date][id]) DB.pauseRepas[date][id] = [];
        DB.pauseRepas[date][id][idx] = c.checked;
      }
      if (c.checked) nbTrav++; else nbDed++;
    });
    saveDB();
    const who = emp(this.session.empId).nom;
    logAction(who, "Pauses repas", `${frDate(date)} : ${nbTrav} service(s) comptés travaillés (30 min), ${nbDed} service(s) pause déduite (30 min)`);
    closeModal();
    toast("Pauses repas enregistrées.", "ok");
    this.renderAdminPanel();
  },
  /* ----- COMMENTAIRE SUR LE COMPORTEMENT (par salarié et par jour, tracé + exporté) ----- */
  commenterComportement() {

    if (date > this.currentDate) { toast("Pas de commentaire sur un jour futur.", "err"); return; }

      <p style="font-size:.76rem;color:var(--ink-dim);margin:-4px 0 12px">Laissez vide puis Enregistrer pour supprimer le commentaire du salarié sélectionné.</p>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>

  saveCommentaire(date) {

    const texte = document.getElementById("comTexte").value.trim();
    const e = emp(id); if (!e) return;

      if (DB.commentaires[date] && DB.commentaires[date][id]) {
        delete DB.commentaires[date][id];
        logAction(who, "Commentaire comportement", `${e.nom} (${frDate(date)}) : commentaire supprimé`);
      }
    } else {
      if (!DB.commentaires[date]) DB.commentaires[date] = {};
      DB.commentaires[date][id] = { texte, by: who, ts: Date.now() };
      logAction(who, "Commentaire comportement", `${e.nom} (${frDate(date)}) : ${texte}`);
    }
    saveDB();
    closeModal();
    toast("Commentaire enregistré.", "ok");

  _marquerStatut(empId, type) {
    const e = emp(empId); if (!e) return;
    const date = this.jourConsulte || this.currentDate;
    const libelle = type==="maladie" ? "EN ARRÊT MALADIE" : "ABSENT";
    if (pairesJour(empId, date).length) { toast("Des pointages existent déjà pour ce jour.", "err"); return; }
    if (!confirm(`Marquer ${e.nom} ${libelle} le ${frDate(date)} ? Ponctualité et temps travaillé seront à 0.`)) return;
    if (!DB.absences[date]) DB.absences[date] = {};
    DB.absences[date][empId] = { type, by: emp(this.session.empId).nom, ts: Date.now() };
    // un statut confirmé lève l'alerte "à vérifier"
    if (DB.aVerifier[date] && DB.aVerifier[date][empId]) delete DB.aVerifier[date][empId];
    saveDB();
    logAction(emp(this.session.empId).nom, type==="maladie"?"Arrêt maladie":"Absence",
      `${e.nom} marqué ${type==="maladie"?"en arrêt maladie":"absent"} le ${date} (ponctualité 0, temps 0)`);
    toast(`${e.nom} marqué ${type==="maladie"?"en arrêt maladie":"absent"}.`, "ok");
    this.renderAdminPanel();
  },
  marquerAbsent(empId) { this._marquerStatut(empId, "absent"); },

  annulerAbsence(empId) {

  /* ----- ÉDITION D'UN POINTAGE (avec règles de sécurité) ----- */
  editPointage(empId) {
    const e = emp(empId);
    const isSelf = empId === this.session.empId;
    const isManager = this.session.access==="manager";
    // Règle : le manager NE PEUT PAS modifier ses propres heures
    if (isManager && isSelf) {
      toast("Un manager ne peut pas modifier ses propres heures. Seul le dirigeant le peut.", "err");
      return;
    }
    const date = this.jourConsulte || this.currentDate;
    const paires = pairesJour(empId, date);
    const prevu = getPrevu(empId, date);
    const nbCreneaux = prevu && prevu.creneaux ? prevu.creneaux.length : 0;
    const nb = Math.max(paires.length, nbCreneaux, 1);
    this.editCtx = { empId, date, nb };
    let blocks = "";
    for (let i=0;i<nb;i++){
      const pr = prevu && prevu.creneaux ? prevu.creneaux[i] : null;
      const pa = paires[i];
      const titre = nb>1 ? `Service ${i+1}` : "Horaire";
      const departAuto = !!(pa && pa.outP && pa.outP.auto);
      blocks += `
        <div style="border:1px solid var(--line);border-radius:12px;padding:12px 12px 2px;margin-bottom:10px">
          <div style="font-weight:600;font-size:.85rem;margin-bottom:6px">${titre}${pr?` <span style="color:var(--ink-dim);font-weight:400">· prévu ${pr.debut}–${pr.fin}</span>`:''}</div>
          <div class="row" style="gap:10px">
            <label class="field" style="flex:1;min-width:120px"><span>Arrivée</span>
              <input type="time" id="edIn${i}" value="${pa?(pa.in||''):''}"></label>
            <label class="field" style="flex:1;min-width:120px"><span>Départ</span>
              <input type="time" id="edOut${i}" value="${pa?(pa.out||''):''}"></label>
          </div>
          ${departAuto?`<div style="font-size:.74rem;color:var(--accent);margin:0 0 8px;line-height:1.45">⚠️ Départ <b>complété automatiquement</b> à la fin prévue (oubli de pointage). Vous pouvez le <b>rallonger</b> jusqu'à l'heure réelle de sortie pour compter les heures supplémentaires.</div>`:''}
        </div>`;
    }
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>${(DB.aVerifier&&DB.aVerifier[date]&&DB.aVerifier[date][empId])||badgeageBloque(empId,date)?'Régulariser':'Modifier'} — ${e.nom}</h3>
      <div class="modal-sub">${frDate(date)}${nb>1?` · ${nb} services (coupure)`:''}</div>
      ${blocks}
      <label class="field"><span>Commentaire (obligatoire) — motif précis de la modification</span>
        <textarea id="edComment" placeholder="Ex. : oubli de pointage le midi, badgé manuellement après vérification"></textarea></label>
      <p style="font-size:.76rem;color:var(--ink-dim);margin:-6px 0 14px;line-height:1.5">
        ⚠️ Règles : pas d'heure dans le futur · pour un service existant, l'arrivée ne peut qu'être <b>retardée</b>, le départ qu'<b>avancé</b> (impossible d'ajouter des heures) · <b>exception</b> : un départ complété automatiquement (oubli) peut être rallongé jusqu'à l'heure réelle de sortie · laissez un service vide pour le supprimer.</p>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="App.saveEditPointage('${empId}')">Enregistrer</button>
      </div>`);
  },
  saveEditPointage(empId) {
    const e = emp(empId);
    const date = this.jourConsulte || this.currentDate;
    const comment = document.getElementById("edComment").value.trim();
    if (!comment) { toast("Le commentaire est obligatoire pour modifier un horaire.", "err"); return; }
    const nb = (this.editCtx && this.editCtx.empId===empId) ? this.editCtx.nb : 1;
    const oldPaires = pairesJour(empId, date);

    const tsOf = (hm)=>{ if(!hm) return null; const [h,m]=hm.split(":").map(Number); const [y,mo,d]=date.split("-").map(Number); return new Date(y,mo-1,d,h,m).getTime(); };
    const now = Date.now();
    const prevu = getPrevu(empId, date);

    // collecte des services saisis
    const services = [];
    for (let i=0;i<nb;i++){
      const inEl = document.getElementById("edIn"+i), outEl = document.getElementById("edOut"+i);
      services.push({ in: inEl?inEl.value:"", out: outEl?outEl.value:"", old: oldPaires[i]||null });
    }

    // validations PAR SERVICE
    for (let i=0;i<services.length;i++){
      const s = services[i], lbl = nb>1?`Service ${i+1} — `:"";
      const crPrevu = prevu && prevu.creneaux ? prevu.creneaux[i] : null;
      const planAin = crPrevu && crPrevu.debut ? tsOf(crPrevu.debut) : null;
      // RÈGLE 1 : pas d'heure dans le futur
      if (s.in && tsOf(s.in) > now+60000) { toast(`${lbl}arrivée : heure dans le futur impossible.`, "err"); return; }
      if (s.out && tsOf(s.out) > now+60000) { toast(`${lbl}départ : heure dans le futur impossible.`, "err"); return; }
      // RÈGLE 2 — ARRIVÉE : on autorise le RATTRAPAGE d'un oubli (l'arrivée peut être avancée),
      //   mais JAMAIS avant l'heure prévue. Pour un profil sans horaire prévu (renfort/extra),
      //   on garde l'ancienne règle : l'arrivée ne peut qu'être retardée.
      if (s.in) {
        if (planAin !== null) {
          if (tsOf(s.in) < planAin - 60000) { toast(`${lbl}l'arrivée ne peut pas être placée avant l'heure prévue (${crPrevu.debut}).`, "err"); return; }
        } else if (s.old && s.old.in && tsOf(s.in) < tsOf(s.old.in)-60000) {
          toast(`${lbl}l'arrivée ne peut être que retardée (anti-ajout d'heures).`, "err"); return;
        }
      }
      // DÉPART : ne peut qu'être AVANCÉ (anti-ajout d'heures).
      //   EXCEPTION : si le départ existant a été posé AUTOMATIQUEMENT (oubli clôturé à la
      //   fin prévue), la gestion PEUT le rallonger jusqu'à l'heure réelle de sortie pour
      //   compter les heures supplémentaires. R1 (pas d'heure future) reste appliquée plus haut,
      //   et le plafond de durée (MAX_SERVICE_MIN) protège le décompte contre une valeur aberrante.
      const departAuto = !!(s.old && s.old.outP && s.old.outP.auto);
      if (s.old && s.old.out && s.out && !departAuto && tsOf(s.out) > tsOf(s.old.out)+60000) { toast(`${lbl}le départ ne peut être qu'avancé (anti-ajout d'heures).`, "err"); return; }
      // RÈGLE 3 : arrivée et départ ne peuvent pas être à la même heure (durée nulle / +24 h)
      if (s.in && s.out && s.in === s.out) { toast(`${lbl}arrivée et départ identiques : corrigez les heures.`, "err"); return; }
      // RÈGLE 4 : départ AVANT l'arrivée interdit, SAUF service de nuit prévu (fin après minuit).
      //   Évite qu'une faute de frappe (ex. 09:00 → 08:00) soit comptée comme ~23 h via le passage minuit.
      if (s.in && s.out && hmToMin(s.out) < hmToMin(s.in)) {
        const overnightPrevu = crPrevu && crPrevu.debut && crPrevu.fin && hmToMin(crPrevu.fin) <= hmToMin(crPrevu.debut);
        if (!overnightPrevu) { toast(`${lbl}le départ est avant l'arrivée. Un service de nuit doit être prévu comme tel au planning (fin après minuit).`, "err"); return; }
      }
    }

    // RECONSTRUCTION non destructive : on retire les in/out du jour puis on recrée service par service
    DB.pointages = DB.pointages.filter(p=>!(p.empId===empId && p.date===date && (p.type==="in"||p.type==="out")));
    services.forEach(s=>{
      if (s.in)  this._pushPointage(empId, date, "in",  s.in,  s.old?s.old.inP:null);
      if (s.out) this._pushPointage(empId, date, "out", s.out, s.old?s.old.outP:null);
    });

    const aQqc = services.some(s=>s.in||s.out);
    if (aQqc && DB.aVerifier && DB.aVerifier[date] && DB.aVerifier[date][empId]) delete DB.aVerifier[date][empId];

    saveDB();
    const who = emp(this.session.empId).nom;
    const detail = services.map((s,i)=>`S${i+1} ${s.old?(s.old.in||'—'):'—'}→${s.in||'—'} / ${s.old?(s.old.out||'—'):'—'}→${s.out||'—'}`).join(" · ");
    logAction(who, "Modification horaire", `${e.nom} — ${date} : ${detail}. Motif : ${comment}`);
    this.editCtx = null;
    closeModal();
    toast("Horaire(s) modifié(s) et journalisé(s).", "ok");
    this.renderAdminPanel();
  },
  /* Ajoute un pointage (sans effacer les autres du même type) */
  _pushPointage(empId, date, type, hm, existing) {
    if (!hm) return;
    const [h,m] = hm.split(":").map(Number);
    const [y,mo,d] = date.split("-").map(Number);
    const ts = new Date(y,mo-1,d,h,m).getTime();
    DB.pointages.push({
      id:"p"+Date.now()+Math.random().toString(36).slice(2,5),
      empId, date, type, time:hm, ts,
      signature: existing?existing.signature : "",
      editedBy: emp(this.session.empId).nom
    });
  },

  /* ----- onglet RÉCAP MENSUEL ----- */
  moisSel: null,
  tabMois(c) {
    if (!this.moisSel) this.moisSel = this.currentDate.slice(0,7);
    // toutes les dates de pointage du mois
    const moisISO = this.moisSel;
    // construire pour chaque salarié la somme des soldes du mois + total jours
    const lignes = DB.team.filter(e=>e.access==="salarie").map(e=>{
      let soldeTotal = 0, jours = 0, retardJours = 0, bonusJours = 0, minTravaillees = 0;
      // parcourir les jours du mois où il y a un prévu OU un pointage
      const dates = new Set();
      Object.keys(DB.planning).forEach(d=>{ if(d.startsWith(moisISO)&&DB.planning[d][e.id]) dates.add(d); });
      Object.keys(DB.renforts).forEach(d=>{ if(d.startsWith(moisISO)&&DB.renforts[d][e.id]) dates.add(d); });
      DB.pointages.forEach(p=>{ if(p.empId===e.id&&p.date.startsWith(moisISO)) dates.add(p.date); });
      dates.forEach(d=>{
        const paires = pairesJour(e.id, d);
        const prevu = getPrevu(e.id, d);
        const s = calcSoldeJour(prevu, paires);
        minTravaillees += tempsTravailleMin(paires, e.id, d);
        if (s!==null){ soldeTotal+=s; jours++; if(s<0)retardJours++; if(s>0)bonusJours++; }
      });
      return { e, soldeTotal, jours, retardJours, bonusJours, minTravaillees };
    }).filter(l=>l.jours>0 || l.minTravaillees>0);

    const moisLabel = new Date(moisISO+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
    const fmtH = m => `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}`;

    const date = this.currentDate;
    const id = document.getElementById("rfEmp").value;

      </tbody></table></div></div>`;

  ajouterExtra() {
    const date = this.currentDate;
    const prenom = document.getElementById("exPrenom").value.trim();
    const nom = document.getElementById("exNom").value.trim();
    const poste = document.getElementById("exPoste").value.trim();
    const commentaire = document.getElementById("exComment").value.trim();

      toast("Tous les champs sont obligatoires pour un extra.", "err"); return;
    }
    const id = "x_" + Date.now();
    if (!DB.extras[date]) DB.extras[date] = {};
    DB.extras[date][id] = { prenom, nom, poste, commentaire, by: emp(this.session.empId).nom, at: Date.now() };
