      `${prenom} ${nom} (${poste}) — ${date}. Commentaire : ${commentaire}`);

    const x = DB.extras[date] && DB.extras[date][id];
    if (x) {
      // retirer aussi ses pointages du jour
      DB.pointages = DB.pointages.filter(p=>!(p.empId===id && p.date===date));
      delete DB.extras[date][id];
      saveDB();
      logAction(emp(this.session.empId).nom, "Retrait extra", `${x.prenom} ${x.nom} — ${date}`);
    }
    this.renderAdminPanel();
  },

  /* ----- onglet CODES PIN ----- */
  tabPins(c) {
    const isDir = this.session.access==="dirigeant";
    const moiId = this.session.empId;
    const actifs = DB.team.filter(e=>!e.archived);
    const archives = DB.team.filter(e=>e.archived);
    const rows = actifs.map(e=>{
      // Qui peut modifier qui ?
      // - Dirigeant : tout le monde
      // - Manager : les salariés uniquement (pas lui-même, pas le dirigeant)
      let canEdit = false, raison = "";
      if (isDir) {
        canEdit = true;
      } else { // manager
        if (e.id===moiId) { raison = "votre propre code"; }
        else if (e.access==="dirigeant") { raison = "réservé au Dirigeant"; }
        else { canEdit = true; }
      }
      // archivage : dirigeant -> tous sauf lui-même ; manager -> salariés uniquement (pas lui)
      const canArchive = isDir ? (e.id!==moiId) : (e.access==="salarie" && e.id!==moiId);
      const btnPin = canEdit
        ? `<button class="btn btn-ghost btn-sm" onclick="App.changePin('${e.id}')">Changer le PIN</button>`
        : `<span style="color:var(--ink-dim);font-size:.82rem">${raison}</span>`;
      const btnVoir = isDir
        ? `<button class="btn btn-ghost btn-sm" onclick="App.revealPin('${e.id}')">👁 Voir</button>` : "";
      const btnArch = canArchive
        ? `<button class="btn btn-ghost btn-sm" style="color:#e8556b" onclick="App.archiverEmp('${e.id}')">Archiver</button>` : "";
      // changement de niveau d'accès : réservé au Dirigeant
      const btnAcces = isDir
        ? `<button class="btn btn-ghost btn-sm" onclick="App.changeAccess('${e.id}')">Rôle d'accès</button>` : "";
      const tagAcces = e.access==="dirigeant"
        ? `<span class="badge-delta" style="background:rgba(232,85,107,.15);color:#e8556b;margin-left:6px">Dirigeant</span>`
        : e.access==="manager"
          ? `<span class="badge-delta" style="background:rgba(240,168,48,.18);color:var(--accent);margin-left:6px">Manager</span>`
          : "";
      // secteur (salle / cuisine) : modifiable par le manager et le dirigeant (pas pour un dirigeant)
      const sect = secteurDe(e);
      const tagSect = `<span class="badge-delta" style="background:rgba(155,167,196,.16);color:var(--ink-soft);margin-left:6px">${sect==="cuisine"?"👨‍🍳 Cuisine":"🍽️ Salle"}</span>`;
      const canSect = isDir || e.access!=="dirigeant";
      const btnSect = canSect
        ? `<button class="btn btn-ghost btn-sm" onclick="App.changeSecteur('${e.id}')">Secteur</button>` : "";
      // réglage durable "ne prend pas ses pauses"
      const sansPause = pauseAutoActifMaintenant(e.id);
      const tagPause = sansPause
        ? `<span class="badge-delta" style="background:rgba(240,168,48,.18);color:var(--accent);margin-left:6px">🍽️ sans pause</span>` : "";
      const btnPause = canSect
        ? `<button class="btn btn-ghost btn-sm"${sansPause?' style="color:var(--accent)"':''} onclick="App.togglePauseAuto('${e.id}')">${sansPause?'Réactiver pauses':'Sans pause'}</button>` : "";
      return `<tr>
        <td>${e.nom}${tagAcces}${tagSect}${tagPause}<div style="color:var(--ink-soft);font-size:.78rem">${e.role}</div></td>
        <td class="num" style="letter-spacing:.3em">••••</td>
        <td><div class="row" style="gap:6px;flex-wrap:wrap;justify-content:flex-end">${btnPin}${btnVoir}${btnSect}${btnPause}${btnAcces}${btnArch}</div></td>
      </tr>`;
    }).join("");
    // Section des salariés archivés
    let blocArchives = "";
    if (archives.length) {
      const ar = archives.map(e=>`<tr style="opacity:.7">
        <td>${e.nom}<div style="color:var(--ink-soft);font-size:.78rem">${e.role} · archivé</div></td>
        <td><div class="row" style="gap:6px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="App.reactiverEmp('${e.id}')">Réactiver</button>
        </div></td>
      </tr>`).join("");
      blocArchives = `
        <h3 style="font-size:1rem;margin:24px 0 8px;color:var(--ink-soft)">📦 Salariés archivés (${archives.length})</h3>
        <p style="color:var(--ink-dim);font-size:.82rem;margin:0 0 10px">Retirés de la pointeuse et des plannings à venir. Leur historique et leurs pointages restent visibles dans les récaps et exports. Réactivables à tout moment.</p>
        <div class="table-card"><table>
          <thead><tr><th>Salarié</th><th></th></tr></thead>
          <tbody>${ar}</tbody>
        </table></div>`;
    }
    c.innerHTML = `
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap">
        <p style="color:var(--ink-soft);font-size:.9rem;margin:0;flex:1;min-width:200px">
          Gérez vos salariés et leur code PIN (4 chiffres) utilisé pour pointer.${isDir?'' : ' En tant que Manager, vous gérez les salariés, mais pas votre propre code ni celui du Dirigeant.'}</p>
        <button class="btn btn-primary btn-sm" onclick="App.addEmp()">➕ Ajouter un salarié</button>
      </div>
      <div class="table-card"><table>
        <thead><tr><th>Salarié</th><th>Code</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      ${blocArchives}`;
  },
  addEmp() {
    const isDir = this.session.access==="dirigeant";
    const selAcces = isDir ? `
      <label class="field"><span>Rôle d'accès</span>
        <select id="neAccess">
          <option value="salarie">Salarié (pointage uniquement)</option>
          <option value="manager">Manager (accès gestion)</option>
        </select></label>` : "";
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>➕ Nouveau salarié</h3>
      <div class="modal-sub">Le code PIN peut rester vide : un code temporaire sera généré automatiquement.</div>
      <label class="field"><span>Nom complet</span>
        <input type="text" id="neNom" placeholder="Ex. : Léa Fontaine"></label>
      <label class="field"><span>Rôle / poste (facultatif)</span>
        <input type="text" id="neRole" placeholder="Ex. : Serveuse, Chef de rang…"></label>
      <label class="field"><span>Secteur</span>
        <select id="neSecteur">
          <option value="salle">🍽️ Salle</option>
          <option value="cuisine">👨‍🍳 Cuisine</option>
        </select></label>
      ${selAcces}
      <label class="field"><span>Code PIN (4 chiffres, facultatif)</span>
        <input type="text" id="nePin" inputmode="numeric" maxlength="4" placeholder="auto" style="letter-spacing:.3em;text-align:center"></label>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary" onclick="App.saveNewEmp()">Créer</button>
      </div>`);
  },
  saveNewEmp() {
    const nom = (document.getElementById("neNom").value||"").trim();
    const role = (document.getElementById("neRole").value||"").trim() || "Salarié";
    let pin = (document.getElementById("nePin").value||"").trim();
    // niveau d'accès : seul le Dirigeant peut créer un Manager
    const selEl = document.getElementById("neAccess");
    let access = "salarie";
    if (this.session.access==="dirigeant" && selEl && selEl.value==="manager") access = "manager";
    if (!estNomValide(nom)) { toast("Indiquez un nom valide.", "err"); return; }
    if (DB.team.some(e=>e.nom.toLowerCase().trim()===nom.toLowerCase())) {
      toast("Un salarié porte déjà ce nom.", "err"); return;
    }
    const used = new Set(DB.team.map(e=>e.pin));
    if (pin) {
      if (!/^\d{4}$/.test(pin)) { toast("Le code doit comporter exactement 4 chiffres.", "err"); return; }
    } else {
      pin = genererPin(used);
    }
    const id = "e_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    const secEl = document.getElementById("neSecteur");
    const secteur = (secEl && secEl.value==="cuisine") ? "cuisine" : "salle";
    DB.team.push({ id, nom, role, pin, access, secteur });
    saveDB();
    logAction(emp(this.session.empId).nom, "Ajout salarié", `${nom} créé (PIN ${pin})${access!=="salarie"?` — accès ${access}`:""}`);
    closeModal();
    toast(`${nom} ajouté — PIN ${pin}.`, "ok");
    this.renderAdminPanel();
  },
  /* Changer le niveau d'accès d'un membre (réservé au Dirigeant) */
  changeAccess(empId) {
    if (this.session.access!=="dirigeant") { toast("Réservé au Dirigeant.", "err"); return; }
    const e = emp(empId); if (!e) return;
    const opt = (val,lib,desc) => `
      <button class="btn ${e.access===val?'btn-primary':'btn-ghost'} btn-block" style="text-align:left;margin-bottom:8px"
        onclick="App.saveAccess('${empId}','${val}')">
        <b>${lib}</b><div style="font-size:.78rem;opacity:.8">${desc}</div></button>`;
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>Rôle d'accès — ${e.nom}</h3>
      <div class="modal-sub">Choisissez le niveau d'accès. Le rôle actuel est mis en évidence.</div>
      ${opt("salarie","Salarié","Peut uniquement pointer ses heures.")}
      ${opt("manager","Manager","Accès à l'espace gestion : planning, pointages, salariés.")}
      ${opt("dirigeant","Dirigeant","Tous les droits, y compris les paramètres.")}
      <button class="btn btn-ghost btn-block mt" onclick="closeModal()">Annuler</button>`);
  },
  saveAccess(empId, level) {
    if (this.session.access!=="dirigeant") { toast("Réservé au Dirigeant.", "err"); return; }
    const e = DB.team.find(t=>t.id===empId); if (!e) { closeModal(); return; }
    if (!["salarie","manager","dirigeant"].includes(level)) { closeModal(); return; }
    // garde-fou : il doit toujours rester au moins un Dirigeant
    if (e.access==="dirigeant" && level!=="dirigeant") {
      const autresDir = DB.team.filter(t=>t.access==="dirigeant" && t.id!==empId).length;
      if (autresDir===0) { toast("Il doit rester au moins un Dirigeant.", "err"); return; }
    }
    const ancien = e.access;
    e.access = level;
    saveDB();
    logAction(emp(this.session.empId).nom, "Changement de rôle", `${e.nom} : ${ancien} → ${level}`);
    closeModal();
    toast(`${e.nom} est maintenant ${level==="salarie"?"salarié":level}.`, "ok");
    this.renderAdminPanel();
  },
  /* Changer le secteur (salle / cuisine) — manager ou dirigeant */
  changeSecteur(empId) {
    const e = emp(empId); if (!e) return;
    if (this.session.access!=="dirigeant" && e.access==="dirigeant") { toast("Action réservée au Dirigeant.", "err"); return; }
    const cur = secteurDe(e);
    const opt = (val,lib) => `<button class="btn ${cur===val?'btn-primary':'btn-ghost'} btn-block" style="margin-bottom:8px"
        onclick="App.saveSecteur('${empId}','${val}')">${lib}</button>`;
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>Secteur — ${e.nom}</h3>
      <div class="modal-sub">Détermine la section où la carte de pointage apparaît.</div>
      ${opt("salle","🍽️ Salle")}
      ${opt("cuisine","👨‍🍳 Cuisine")}

  /* Réglage durable : "ne prend pas ses pauses repas" (30 min comptées comme travaillées),

  togglePauseAuto(empId) {
    const e = emp(empId); if (!e) return;
    if (this.session.access!=="dirigeant" && e.access==="dirigeant") { toast("Action réservée au Dirigeant.", "err"); return; }
    if (!DB.pauseAuto[empId]) DB.pauseAuto[empId] = [];

    const actif = arr.length && arr[arr.length-1].to === null;
    const who = emp(this.session.empId).nom;
    if (actif) {
      arr[arr.length-1].to = this.currentDate; // reprend ses pauses à partir d'aujourd'hui (jours passés inchangés)

    if (!isDir && e.access!=="salarie") { toast("Action réservée au Dirigeant.", "err"); return; }

    if (this._activiteAujourdhui(empId).actif) { toast("Action impossible : activité aujourd'hui.", "err"); return; }

      this.expTo = auj;

      const [y,mo] = auj.split("-").map(Number);
      const dPrec = new Date(y, mo-2, 1); // mois précédent

  exportPointages(ids) {
    const idsSet = (ids && ids.length) ? new Set(ids) : null;
    let csv = "Date;Salarié;Rôle;Service n°;Prévu début;Prévu fin;Arrivée réelle;Départ réel;Pause repas;Temps travaillé jour;Ponctualité jour (min);Modifié par;Motif modification (direction);Commentaire comportement\n";
    const csvCom = (d,id)=>{ const c = DB.commentaires && DB.commentaires[d] && DB.commentaires[d][id] && DB.commentaires[d][id].texte;
      return c ? '"'+String(c).replace(/"/g,'""').replace(/[\r\n]+/g,' ')+'"' : ''; };
    // Met un champ commentaire entre guillemets (même règle que csvCom) — vide si chaîne vide
    const csvCell = (s)=> s ? '"'+String(s).replace(/"/g,'""').replace(/[\r\n]+/g,' ')+'"' : '';
    // Motif(s) saisi(s) par la direction lors des modifications d'horaire pour (jour, salarié),
    // repris du JOURNAL (action « Modification horaire ») pour vérification dans Excel.
    const motifsDirection = (d, nom)=>{
      const prefixe = nom + " — " + d + " :";
      const ms = (DB.journal||[])
        .filter(x => x && x.action === "Modification horaire" && typeof x.detail === "string" && x.detail.indexOf(prefixe) === 0)
        .map(x => { const k = x.detail.lastIndexOf("Motif : "); return k>=0 ? x.detail.slice(k+8).trim() : ""; })
        .filter(Boolean);
      return ms.length ? ms.join(" | ") : "";
    };
    const dates = [...new Set([...DB.pointages.map(p=>p.date), ...Object.keys(DB.absences||{}), ...Object.keys(DB.commentaires||{})])].sort().filter(d=>this._dansPlage(d));
    let nbLignes = 0;
    dates.forEach(d=>{
      prevusDuJour(d).concat([...new Set(DB.pointages.filter(p=>p.date===d).map(p=>p.empId))])
        .concat(DB.commentaires[d]?Object.keys(DB.commentaires[d]):[])
        .filter((v,i,a)=>a.indexOf(v)===i)
        .filter(id=> !idsSet || idsSet.has(id))
        .forEach(id=>{
        const e = emp(id); if(!e) return;
        const paires = pairesJour(id, d);
        if(!paires.length){
          // salarié marqué absent / en arrêt maladie, OU simple commentaire sans pointage
          if (estAbsent(id, d)) {
            const prevuA = getPrevu(id, d);
            const crA = prevuA && prevuA.creneaux ? prevuA.creneaux[0] : null;
            const info = DB.absences[d] && DB.absences[d][id] ? DB.absences[d][id] : {};
            const lib = (info.type==="maladie") ? "ARRÊT MALADIE" : "ABSENT";
            csv += `${d};${e.nom};${e.role};;${crA?crA.debut:''};${crA?crA.fin:''};${lib};${lib};;0h00;0;${info.by||''};;${csvCom(d,id)}\n`;
            nbLignes++;
          } else if (csvCom(d,id)) {
            // commentaire de comportement sans pointage ni absence : on l'exporte quand même
            csv += `${d};${e.nom};${e.role};;;;;;;;;;;${csvCom(d,id)}\n`;
            nbLignes++;
          }
          return;
        }
        const prevu = getPrevu(id, d);
        const solde = calcSoldeJour(prevu, paires);
        const tt = tempsTravailleMin(paires, id, d);
        const ttLabel = tt>0 ? `${Math.floor(tt/60)}h${String(tt%60).padStart(2,'0')}` : '';
        const comTexte = (DB.commentaires && DB.commentaires[d] && DB.commentaires[d][id] && DB.commentaires[d][id].texte) || '';
        const motifDir = motifsDirection(d, e.nom);
        paires.forEach((p,i)=>{
          const cr = prevu && prevu.creneaux ? prevu.creneaux[i] : null;
          const modif = (p.inP?.editedBy || p.outP?.editedBy || '');
          const pauseCol = (p.in&&p.out) ? (pauseTravaillee(id,d,i) ? "travaillée (incluse)" : "-30 min déduites") : "";
          // FLAGS reconnaissables (repris du vocabulaire du journal) : départ clôturé
          // automatiquement par le système, et anomalies de pointage (oubli d'arrivée/départ).
          const flags = [];
          if (p.outP && p.outP.auto) flags.push("Départ complété (oubli) — clôture auto à la fin prévue");
          if (p.inP  && p.inP.auto)  flags.push("Arrivée complétée automatiquement");
          if (p.in && !p.out) flags.push("Arrivée sans départ (service non clôturé)");
          if (!p.in && p.out) flags.push("Départ sans arrivée (badge isolé)");
          const parts = [];
          if (flags.length) parts.push("[AUTO] " + flags.join(" · "));
          if (i===0 && comTexte) parts.push(comTexte);
          const comCol = csvCell(parts.join(" | "));
          csv += `${d};${e.nom};${e.role};${i+1};${cr?cr.debut:''};${cr?cr.fin:''};${p.in||''};${p.out||''};${pauseCol};${i===0?ttLabel:''};${i===0&&solde!==null?solde:''};${modif};${csvCell(i===0?motifDir:'')};${comCol}\n`;
          nbLignes++;
        });
      });
    });
    const suffixe = ((this.expFrom||this.expTo) ? `_${this.expFrom||"debut"}_au_${this.expTo||"fin"}` : "_tout") + this._suffixeSalaries(idsSet);
    downloadFile(csv, `pointages${suffixe}_${todayISO()}.csv`, "text/csv");
    toast(nbLignes ? `Export généré : ${nbLignes} ligne(s).` : "Export généré (aucune donnée pour la sélection).", "ok");
  },
  /* Suffixe de nom de fichier selon les salariés sélectionnés */
  _suffixeSalaries(idsSet) {
    if (!idsSet) return "";
    if (idsSet.size === 1) { const e = emp([...idsSet][0]); return "_" + (e ? e.nom.replace(/[^A-Za-z0-9]+/g,"-") : "1-salarie"); }
    return `_${idsSet.size}-salaries`;
  },

    const suffixe = ((this.expFrom||this.expTo) ? `_${this.expFrom||"debut"}_au_${this.expTo||"fin"}` : "_tout") + this._suffixeSalaries(idsSet);

  /* ---------- IMPORT DU PLANNING ---------- */
  openImport() {
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>Importer le planning</h3>
      <div class="modal-sub">Chargez le fichier <b>planning_restaurant_2026</b> (.xlsx). L'app lira les horaires prévus de chaque salarié.</div>
      <label class="field"><span>Fichier planning (.xlsx)</span>
        <input type="file" id="planFile" accept=".xlsx"></label>
      <div id="importInfo" style="font-size:.85rem;color:var(--ink-soft);margin-bottom:14px"></div>
      <button class="btn btn-primary btn-block" onclick="App.doImport()">📥 Lire et importer</button>
      <p style="font-size:.78rem;color:var(--ink-dim);margin-top:14px">
        Astuce : si le manager importe un planning modifié, les changements d'horaires détectés exigeront un commentaire.</p>`);
  },
  async doImport() {
    const f = document.getElementById("planFile").files[0];
    if (!f) { toast("Choisissez un fichier.", "err"); return; }
    // réinitialiser l'état d'import (au cas où un import précédent aurait été interrompu)
    App._aliasNoms = {};
    this._pendingRenames = [];
    this._excludeRoster = new Set();
    this._nouveauxSalaries = null;
    try {
      const data = await f.arrayBuffer();
      this._importData = data; this._importName = f.name;
      // 1re lecture : on récupère uniquement les noms (Fiche Personnel + grilles mensuelles)
      const { personnel, noms } = await parseXlsxPlanning(data);
      this._importPersonnel = personnel || [];
      this._importNoms = noms || [];
      // ARBITRAGE DES NOMS : repérer les noms Excel proches d'un salarié existant (point 3)
      const ambigus = this._detecterNomsAmbigus(this._importPersonnel, this._importNoms);
      if (ambigus.length) { this._popupResolutionNoms(ambigus); return; } // on attend la décision
      await this._poursuivreImport();
    } catch(e) {
      console.error(e); toast("Impossible de lire ce fichier : "+e.message, "err");
    }
  },
  /* Repère les noms du fichier qui RESSEMBLENT à un salarié existant sans être
     strictement identiques. Renvoie [{excelName, poste, candidats:[{id,nom,role}]}]. */
  _detecterNomsAmbigus(personnel, noms) {
    const map = new Map(); // normNom -> {excelName, poste}
    (personnel||[]).forEach(p=>{
      const nom = String(p && p.nom || "").trim();
      if (!estNomValide(nom)) return;
      map.set(normNom(nom), { excelName: nom, poste: String(p&&p.poste||"").trim() });
    });
    (noms||[]).forEach(n=>{
      const nom = String(n||"").trim();
      if (!estNomValide(nom)) return;
      const k = normNom(nom);
      if (!map.has(k)) map.set(k, { excelName: nom, poste: "" });
    });
    const existants = DB.team.filter(t=>!t.archived);
    const ambigus = [];
    for (const { excelName, poste } of map.values()) {
      if (existants.some(t=>comparerNoms(t.nom, excelName)==="exact")) continue; // identique -> aucune question
      const candidats = existants.filter(t=>comparerNoms(t.nom, excelName)==="proche")
                                 .map(t=>({ id:t.id, nom:t.nom, role:t.role||"" }));
      if (candidats.length) ambigus.push({ excelName, poste, candidats });
      // sinon : nom sans ressemblance -> nouveau salarié, création normale, pas de question
    }
    return ambigus;
  },
  /* Popup d'arbitrage : pour chaque nom ambigu, rattacher (en gardant l'historique)
     ou créer un nouveau salarié ; option de renommage à l'orthographe de l'Excel. */
  _popupResolutionNoms(ambigus) {
    this._ambigus = ambigus;
    const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    const blocs = ambigus.map((a,i)=>{
      const cands = a.candidats.map((c,ci)=>`
        <label style="display:flex;align-items:flex-start;gap:8px;padding:6px 2px;cursor:pointer">
          <input type="radio" name="res_${i}" value="link_${esc(c.id)}" ${ci===0?"checked":""} style="margin-top:3px">
          <span>Rattacher à <b>${esc(c.nom)}</b> <span style="color:var(--ink-soft);font-size:.8rem">· ${esc(c.role||"—")}</span><br>
          <span style="color:var(--ink-soft);font-size:.8rem">conserve tout son historique (pointages, PIN, planning)</span></span>
        </label>`).join("");
      return `
        <div class="table-card" style="padding:12px 14px;margin-bottom:12px">
          <div style="font-weight:600;margin-bottom:8px">Dans l'Excel : « ${esc(a.excelName)} »${a.poste?` <span style="color:var(--ink-soft);font-size:.8rem">· ${esc(a.poste)}</span>`:""}</div>
          ${cands}
          <label style="display:flex;align-items:flex-start;gap:8px;padding:6px 2px;cursor:pointer">
            <input type="radio" name="res_${i}" value="new" style="margin-top:3px">
            <span>Créer un <b>nouveau salarié</b> « ${esc(a.excelName)} » <span style="color:var(--ink-soft);font-size:.8rem">(personne différente — process normal)</span></span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:8px;border-top:1px solid var(--line);font-size:.84rem;cursor:pointer">
            <input type="checkbox" id="rn_${i}" checked>
            Si rattaché : <b>renommer</b> le salarié avec l'orthographe de l'Excel
          </label>
        </div>`;
    }).join("");
    openModal(`
      <button class="modal-close" onclick="App.annulerImport()">×</button>
      <h3>Noms à vérifier avant import — ${ambigus.length}</h3>
      <div class="modal-sub">Des noms du fichier ressemblent à des salariés déjà présents. Pour chacun, indiquez s'il s'agit de la <b>même personne</b> (rattacher, en gardant l'historique et tous les horaires) ou d'une <b>nouvelle</b>. En rattachant, vous pouvez aligner le nom sur l'Excel.</div>
      <div style="max-height:52vh;overflow:auto;margin:4px 0 10px">${blocs}</div>
      <div class="row mt" style="gap:8px">
        <button class="btn btn-ghost" onclick="App.annulerImport()">Annuler l'import</button>
        <button class="btn btn-primary" onclick="App._validerResolutionNoms()">Valider et importer</button>
      </div>`);
  },
  /* Lecture des choix d'arbitrage -> alias (rattachement) + renommages différés. */
  _validerResolutionNoms() {
    const ambigus = this._ambigus || [];
    App._aliasNoms = {};
    this._pendingRenames = [];
    this._excludeRoster = new Set();
    for (let i=0;i<ambigus.length;i++){
      const a = ambigus[i];
      const sel = document.querySelector(`input[name="res_${i}"]:checked`);
      const val = sel ? sel.value : "new";
      if (val.indexOf("link_")===0) {
        const empId = val.slice(5);
        const cand = a.candidats.find(c=>c.id===empId);
        App._aliasNoms[normNom(a.excelName)] = empId;   // le planning se rattachera à ce salarié
        this._excludeRoster.add(normNom(a.excelName));  // ne pas le recréer comme doublon
        const rn = document.getElementById(`rn_${i}`);
        if (rn && rn.checked && cand && cand.nom !== a.excelName) {
          this._pendingRenames.push({ empId, nouveau: a.excelName, ancien: cand.nom });
        }
      }
      // val === "new" : aucune action, ajouterSalaries le créera normalement
    }
    this._ambigus = null;
    closeModal();
    this._poursuivreImport();
  },
  /* Suite de l'import une fois les noms arbitrés : création auto (hors rattachements),
     lecture du planning (alias pris en compte), fusion et flux de confirmation. */
  async _poursuivreImport() {
    const data = this._importData, name = this._importName;
    try {
      const exclude = this._excludeRoster || new Set();
      // CRÉATION AUTO depuis la Fiche Personnel + grilles, en EXCLUANT les noms rattachés
      const roster = []; const deja = new Set();
      (this._importPersonnel||[]).forEach(p=>{
        const nom = String(p&&p.nom||"").trim(); const k = normNom(nom);
        if (!nom || exclude.has(k) || deja.has(k)) return;
        roster.push({ nom, poste: String(p&&p.poste||"").trim() }); deja.add(k);
      });
      (this._importNoms||[]).forEach(n=>{
        const nom = String(n||"").trim(); const k = normNom(nom);
        if (!nom || exclude.has(k) || deja.has(k)) return;
        roster.push({ nom, poste:"" }); deja.add(k);
      });
      const nouveaux = ajouterSalaries(roster);
      this._nouveauxSalaries = nouveaux;
      // LECTURE DU PLANNING : alias + nouveaux salariés désormais résolus par matchEmp
      const { planning: planningExcel, inconnues } = await parseXlsxPlanning(data);
      DB._dernieresInconnues = inconnues || {};
      // FUSION : protéger les jours déjà pointés/clôturés, appliquer l'Excel au reste
      const { fusion, gel, conflits, appliques } = fusionnerPlanning(planningExcel);
      const tousChanges = detectPlanningChanges(DB.planning, fusion);
      const changes = tousChanges.filter(c => c.oldLabel !== "(rien)");
      const nbInco = Object.keys(inconnues||{}).length;
      const totInco = Object.values(inconnues||{}).reduce((a,b)=>a+b,0);
      // CHANGEMENTS DE POSTE pour les salariés existants (y compris ceux rattachés/renommés)
      const changementsPoste = [];
      (this._importPersonnel||[]).forEach(p=>{
        const nom = String(p && p.nom || "").trim();
        const np = String(p && p.poste || "").trim();
        if (!nom || !np) return;
        const aliasId = App._aliasNoms && App._aliasNoms[normNom(nom)];
        const ex = aliasId ? DB.team.find(t=>t.id===aliasId && !t.archived)
                           : DB.team.find(t=>t.nom.toLowerCase().trim()===nom.toLowerCase() && !t.archived);
        if (ex && np !== (ex.role||"").trim()) {
          changementsPoste.push({ empId: ex.id, nom: ex.nom, ancien: ex.role||"—", nouveau: np });
        }
      });
      this.pendingImport = { fusion, changes, changementsPoste, meta: { name, gel, conflits, appliques, nbInco, totInco } };
      if (changementsPoste.length) this.confirmerChangementsPoste();
      else this._dispatchConflits();
    } catch(e) {
      console.error(e); toast("Impossible de lire ce fichier : "+e.message, "err");
    }
  },
  /* Aiguillage des conflits de planning (après l'étape éventuelle des postes) */
  _dispatchConflits() {
    const changes = (this.pendingImport && this.pendingImport.changes) || [];
    const seuil = (DB.settings && DB.settings.seuilConflits) || 5;
    const estDirection = !this.session || this.session.access==="dirigeant";
    if (changes.length === 0) {
      this.finaliserImport("");
    } else if (estDirection) {
      this.confirmerImportDirection();
    } else {
      this.confirmerImportManager(changes.length > seuil);
    }
  },
  /* Étape POSTES : changements de poste détectés -> confirmation en un lot, ou conservation */
  confirmerChangementsPoste() {
    const cp = (this.pendingImport && this.pendingImport.changementsPoste) || [];
    const estManager = this.session && this.session.access==="manager";
    const moiId = this.session && this.session.empId;
    const liste = cp.map(c=>{
      const self = estManager && c.empId===moiId;
      return `<tr${self?' style="opacity:.55"':''}><td>${c.nom}${self?' <span style="color:var(--ink-dim);font-size:.74rem">(vous — réservé au Dirigeant)</span>':''}</td>
        <td style="color:var(--ink-soft)">${c.ancien} → ${self?`<span style="color:var(--ink-dim)">${c.nouveau}</span>`:`<b style="color:var(--accent)">${c.nouveau}</b>`}</td></tr>`;
    }).join("");
    const noteSelf = (estManager && cp.some(c=>c.empId===moiId))
      ? `<div class="modal-sub" style="color:var(--ink-dim)">Votre propre poste ne sera pas modifié (réservé au Dirigeant) ; les autres seront appliqués.</div>` : "";
    openModal(`
      <button class="modal-close" onclick="App.annulerImport()">×</button>
      <h3>Changement de poste — ${cp.length}</h3>
      <div class="modal-sub">Le fichier indique de nouveaux postes pour ces salariés (le secteur Salle/Cuisine suit le poste, sauf s'il a été fixé à la main). Vous pouvez <b>appliquer les nouveaux postes</b> (commentaire requis) ou <b>garder les postes actuels</b> et n'importer que le planning.</div>
      ${noteSelf}
      <div class="table-card mb" style="max-height:220px;overflow:auto"><table>
        <thead><tr><th>Salarié</th><th>Poste</th></tr></thead>
        <tbody>${liste}</tbody></table></div>
      <label class="field"><span>Motif (si vous appliquez les nouveaux postes)</span>
        <textarea id="postesMotif" placeholder="Ex. : changement d'affectation validé"></textarea></label>
      <div class="row mt" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-ghost" onclick="App.ignorerPostes()">Garder les postes actuels</button>
        <button class="btn btn-primary" onclick="App.appliquerPostes()">Appliquer les nouveaux postes</button>
      </div>`);
  },
  appliquerPostes() {
    const motif = (document.getElementById("postesMotif").value||"").trim();
    if (!motif) { toast("Commentaire obligatoire pour appliquer les nouveaux postes.", "err"); return; }
    const estManager = this.session && this.session.access==="manager";
    const moiId = this.session && this.session.empId;
    const cp = (this.pendingImport && this.pendingImport.changementsPoste) || [];
    const appliques = [], refusesSelf = [];
    cp.forEach(c=>{
      // un manager ne peut pas changer son PROPRE poste (réservé au Dirigeant)
      if (estManager && c.empId===moiId) { refusesSelf.push(c); return; }
      const e = DB.team.find(t=>t.id===c.empId); if (e) { e.role = c.nouveau; appliques.push(c); }
    });
    saveDB();
    const who = this.session ? emp(this.session.empId).nom : "(import)";
    if (appliques.length) {
      logAction(who, "Changement de poste (import)",
        `${appliques.length} poste(s) modifié(s). Motif : ${motif}. Détail : ${appliques.map(c=>`${c.nom} : ${c.ancien}→${c.nouveau}`).join(" ; ")}`);
    }
    if (refusesSelf.length) {
      toast("Votre propre poste n'a pas été modifié (réservé au Dirigeant).", "ok");
      logAction(who, "Poste non modifié", `${who} : changement de son propre poste ignoré (réservé au Dirigeant)`);
    }
    this.pendingImport.changementsPoste = [];
    closeModal();
    this._dispatchConflits();
  },
  ignorerPostes() {
    const cp = (this.pendingImport && this.pendingImport.changementsPoste) || [];
    const who = this.session ? emp(this.session.empId).nom : "(import)";
    logAction(who, "Postes conservés (import)", `${cp.length} changement(s) de poste ignoré(s) — postes actuels conservés`);
    this.pendingImport.changementsPoste = [];
    closeModal();
    this._dispatchConflits();
  },
  /* Récap HTML de la liste des conflits, pour les popups */
  _detailChangesHTML() {
    const ch = (this.pendingImport && this.pendingImport.changes) || [];
    return ch.map(c=>`<tr><td>${c.empNom}</td><td class="num">${frDate(c.date)}</td>
        <td style="color:var(--ink-soft)">${c.oldLabel} → <b style="color:var(--accent)">${c.newLabel}</b></td></tr>`).join("");
  },
  /* Popup Manager : commentaire obligatoire ; liste détaillée si au-dessus du seuil */
  confirmerImportManager(avecDetail) {
    const n = (this.pendingImport && this.pendingImport.changes.length) || 0;
    const detail = avecDetail ? `
      <div class="table-card mb" style="max-height:240px;overflow:auto"><table>
        <thead><tr><th>Salarié</th><th>Jour</th><th>Changement</th></tr></thead>
        <tbody>${this._detailChangesHTML()}</tbody></table></div>` : "";
    openModal(`
      <button class="modal-close" onclick="App.annulerImport()">×</button>
      <h3>Mise à jour du planning — ${n} changement(s)</h3>
      <div class="modal-sub">${avecDetail?"Beaucoup de créneaux changent. Vérifiez la liste ci-dessous, puis justifiez la mise à jour.":"Justifiez la mise à jour du planning."} Commentaire obligatoire.</div>
      ${detail}
      <label class="field"><span>Motif de la mise à jour</span>
        <textarea id="impMotif" placeholder="Ex. : planning de juin / échanges de services validés"></textarea></label>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="App.annulerImport()">Annuler</button>
        <button class="btn btn-primary" onclick="App.validerImportAvecMotif()">Valider l'import</button>
      </div>`);
  },
  /* Popup Direction : commentaire + validation, sans liste ni seuil */
  confirmerImportDirection() {
    const n = (this.pendingImport && this.pendingImport.changes.length) || 0;
    openModal(`
      <button class="modal-close" onclick="App.annulerImport()">×</button>
      <h3>Mise à jour du planning — ${n} changement(s)</h3>
      <div class="modal-sub">Indiquez le motif de la mise à jour, puis validez.</div>
      <label class="field"><span>Motif de la mise à jour</span>
        <textarea id="impMotif" placeholder="Ex. : planning de juin"></textarea></label>
      <div class="row mt">
        <button class="btn btn-ghost" onclick="App.annulerImport()">Annuler</button>
        <button class="btn btn-primary" onclick="App.validerImportAvecMotif()">Valider l'import</button>
      </div>`);
  },
  validerImportAvecMotif() {
    const v = (document.getElementById("impMotif").value||"").trim();
    if (!v) { toast("Commentaire obligatoire.", "err"); return; }
    this.finaliserImport(v);
  },
  /* Annulation : on retire les salariés tout juste créés (au cas où ce serait le mauvais fichier) */
  annulerImport() {
    const nv = this._nouveauxSalaries || [];
    if (nv.length) {
      const ids = new Set(nv.map(s=>s.id));
      DB.team = DB.team.filter(t=>!ids.has(t.id));
      saveDB();
    }
    this._nouveauxSalaries = null;
    this.pendingImport = null;
    // nettoyer l'arbitrage des noms (aucun renommage n'a encore été appliqué : ils sont différés)
    App._aliasNoms = {};
    this._pendingRenames = [];
    this._excludeRoster = new Set();
    this._ambigus = null;
    closeModal();
    toast("Import annulé. Aucun changement appliqué.", "err");
  },
  /* Application effective de l'import en attente + journalisation (toujours le détail) */
  finaliserImport(motif) {
    const pend = this.pendingImport;
    if (!pend) { closeModal(); return; }
    const { fusion, meta, changes } = pend;
    const who = this.session ? emp(this.session.empId).nom : "(import direct)";
    // 0) RENOMMAGES décidés à l'arbitrage des noms (rattachement avec orthographe Excel)
    if (this._pendingRenames && this._pendingRenames.length) {
      const faits = [];
      this._pendingRenames.forEach(r=>{
        const e = DB.team.find(t=>t.id===r.empId);
        if (e && e.nom !== r.nouveau) { e.nom = r.nouveau; faits.push(`${r.ancien} → ${r.nouveau}`); }
      });
      if (faits.length) logAction(who, "Renommage à l'import (rattachement)", faits.join(" ; "));
    }
    DB.planning = fusion; DB.lastPlanningName = meta.name; saveDB();
    const flags = rattraperImport(this.currentDate);
    // 1) salariés créés (avec PIN temporaire)
    if (this._nouveauxSalaries && this._nouveauxSalaries.length) {
      const liste = this._nouveauxSalaries.map(s=>`${s.nom} (PIN ${s.pin})`).join(", ");
      logAction(who, "Salariés créés à l'import",
        `${this._nouveauxSalaries.length} salarié(s) ajouté(s) avec PIN temporaire : ${liste}`);
    }
    // 2) détail des conflits — une seule entrée, automatique
    if (changes && changes.length) {
      const detail = changes.map(c=>`${c.empNom} ${c.date} : ${c.oldLabel} → ${c.newLabel}`).join(" ; ");
      logAction(who, "Mise à jour du planning",
        `${changes.length} créneau(x) modifié(s)${motif?`. Motif : ${motif}`:""}. Détail : ${detail}`);
    }
    // 3) cases non reconnues
    if (meta.nbInco) {
      const inco = DB._dernieresInconnues || {};
      const liste = Object.entries(inco).map(([k,n])=>`"${k}" (×${n})`).join(", ");
      logAction(who, "Cases planning non reconnues",
        `${meta.totInco} case(s) ignorée(s) (${meta.nbInco} valeur(s) distincte(s)) : ${liste}`);
    }
    // 4) ligne d'import standard
    logAction(who, "Import planning",
      `${meta.name} — ${meta.appliques} jour(s) appliqué(s)${meta.gel?`, jours ≤ ${meta.gel} protégés`:''}${meta.conflits?`, ${meta.conflits} conflit(s) ignoré(s)`:''}${flags?` · ${flags} absence(s) à vérifier`:''}${meta.nbInco?` · ${meta.totInco} case(s) non reconnue(s)`:''}`);
    this.pendingImport = null;
    // nettoyage de l'état d'arbitrage (les renommages sont désormais appliqués)
    App._aliasNoms = {}; this._pendingRenames = []; this._excludeRoster = new Set();
    closeModal();
    let msg = "Planning importé.";
    const nbNew = (this._nouveauxSalaries||[]).length;
    if (nbNew) msg += ` ${nbNew} salarié(s) créé(s).`;
    if (changes && changes.length) msg += ` ${changes.length} créneau(x) modifié(s).`;
    if (meta.gel) msg += ` Jours jusqu'au ${meta.gel} protégés (déjà pointés).`;
    if (meta.conflits) msg += ` ${meta.conflits} conflit(s) ignoré(s).`;
    if (flags) msg += ` ${flags} absence(s) à vérifier.`;
    if (meta.nbInco) msg += ` ⚠️ ${meta.totInco} case(s) non reconnue(s) — voir l'onglet Planning.`;
    toast(msg, "ok");
    if (this.session) { this.adminTab = "planning"; this.renderAdminPanel(); }
    else this.showBadge();
    this.montrerNouveauxSalaries();
  },
  /* Affiche la liste des salariés créés à l'import avec leur PIN temporaire.
     Les codes étant masqués partout ailleurs, c'est le seul endroit où on les voit. */
  montrerNouveauxSalaries() {
    const nv = this._nouveauxSalaries || [];
    this._nouveauxSalaries = null; // ne pas réafficher
    if (!nv.length) return;
    const lignes = nv.map(s=>`<tr>
        <td>${s.nom}${s.access==="manager"?` <span class="badge-delta" style="background:rgba(240,168,48,.18);color:var(--accent)">Manager</span>`:""}<div style="color:var(--ink-soft);font-size:.78rem">${s.role||"Salarié"}</div></td>
        <td class="num" style="letter-spacing:.25em;font-weight:600">${s.pin}</td>
      </tr>`).join("");
    const nbMgr = nv.filter(s=>s.access==="manager").length;
    openModal(`
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>👥 ${nv.length} salarié(s) créé(s)</h3>
      <div class="modal-sub">Importés depuis la « Fiche Personnel » avec leur poste. Chacun a reçu un <b>code PIN temporaire</b> ; communiquez-le pour pointer, puis modifiez-le dans l'onglet <b>🔑 Salariés &amp; PIN</b>.${nbMgr?` <b>${nbMgr}</b> manager détecté(s) d'après le poste.`:""}</div>
      <div class="table-card" style="margin-top:6px"><table>
        <thead><tr><th>Salarié / poste</th><th>PIN temporaire</th></tr></thead>
        <tbody>${lignes}</tbody>
      </table></div>
      <p style="font-size:.78rem;color:var(--ink-dim);margin-top:12px">Cette liste est aussi enregistrée dans le <b>Journal</b>. Pensez à changer ces codes rapidement pour la sécurité.</p>
      <button class="btn btn-primary btn-block mt" onclick="closeModal()">J'ai noté les codes</button>`);
  }
};

/* ====================================================================
   IMPORT XLSX (lecture minimaliste, sans librairie externe)
   Le .xlsx est un zip ; on lit les feuilles mensuelles et la Fiche.
   ==================================================================== */
async function parseXlsxPlanning(arrayBuffer) {
  const zip = await unzipXlsx(arrayBuffer);
  // 1. sharedStrings
  const sst = parseSharedStrings(zip["xl/sharedStrings.xml"]);
  // 2. workbook -> noms de feuilles + rId
  const { sheets } = parseWorkbook(zip["xl/workbook.xml"]);
  const rels = parseRels(zip["xl/_rels/workbook.xml.rels"]);

  // Trouver la Fiche Personnel pour la liste des salariés et leurs lignes mensuelles
  const MOIS = {Janvier:1,"Février":2,Fevrier:2,Mars:3,Avril:4,Mai:5,Juin:6,Juillet:7,"Août":8,Aout:8,Septembre:9,Octobre:10,Novembre:11,"Décembre":12,Decembre:12};
  // header_row par mois (comme dans le planning)
  const HEADER = {1:11,2:11,3:11,4:12,5:11,6:11,7:11,8:12,9:11,10:11,11:11,12:11};

  // Construire la liste des salariés depuis la Fiche Personnel (Nom = col A, Poste = col B, à partir de la ligne 4)
  let fiche = null;
  sheets.forEach(s=>{ if (s.name==="Fiche Personnel") fiche = s; });
  const planning = {};
  const inconnues = {}; // valeurs non reconnues dans les cases horaires (pour signaler à l'import)
  const nomsVus = new Set(); // noms rencontrés dans les feuilles mensuelles (filet de sécurité)
  const personnel = [];     // [{nom, poste}] issu de la Fiche Personnel

  if (fiche) {
    const fpath = "xl/" + rels[fiche.rId].replace(/^\/?xl\//,"").replace(/^\//,"");
    const fxml = zip[fpath] || zip["xl/"+rels[fiche.rId]] || zip[rels[fiche.rId]];
    if (fxml) {
      const fcells = parseSheet(fxml, sst);
      // trouver la ligne d'en-tête "Nom" (colonne A) ; les salariés sont juste en dessous. Sinon, repli ligne 4.
      let startRow = null;
      for (let r = 1; r <= 40; r++) {
        const a = fcells[`A${r}`];
        if (a && String(a).trim().toLowerCase() === "nom") { startRow = r + 1; break; }
      }
      if (!startRow) startRow = 4;
      let vides = 0;
      for (let r = startRow; r <= startRow + 80 && vides < 3; r++) {
        const nom = fcells[`A${r}`];
        if (!nom || String(nom).trim() === "") { vides++; continue; }
        vides = 0;
        if (String(nom).trim().toLowerCase().startsWith("total")) break; // fin de liste : "TOTAUX ÉQUIPE"
        const nomT = String(nom).trim();
        if (nomT.length > 40 || /[•:→›»]/.test(nomT)) continue; // ignore les lignes d'aide / explications
        if (!estNomValide(nom)) continue; // ignore en-têtes, etc.
        personnel.push({ nom: nomT, poste: fcells[`B${r}`] ? String(fcells[`B${r}`]).trim() : "" });
      }
    }
  }

  // map nom -> empId de notre équipe
  function matchEmp(nom) {
    // 1) alias résolus à l'import (un nom Excel rattaché manuellement à un salarié existant)
    const alias = App._aliasNoms && App._aliasNoms[normNom(nom)];
    if (alias && DB.team.some(t=>t.id===alias && !t.archived)) return alias;
    // 2) correspondance exacte (casse/espaces près) — comportement historique
    const e = DB.team.find(t=>t.nom.toLowerCase()===String(nom).toLowerCase().trim() && !t.archived);
    return e?e.id:null;
  }

  for (const s of sheets) {
    const moisNum = MOIS[s.name];
    if (!moisNum) continue; // pas une feuille mensuelle
    const path = "xl/" + rels[s.rId].replace(/^\/?xl\//,"").replace(/^\//,"");
    const xml = zip[path] || zip["xl/"+rels[s.rId]] || zip[rels[s.rId]];
    if (!xml) continue;
    const cells = parseSheet(xml, sst); // { "B12": "valeur", ... }

    // (1) ANNÉE : lue dans le titre (ex. "Planning Janvier 2026 — Restaurant") ; sinon année courante
    let annee = null;
    for (let r=1; r<=4 && !annee; r++){
      const m = cells[`A${r}`] && String(cells[`A${r}`]).match(/(20\d{2})/);
      if (m) annee = parseInt(m[1]);
    }
    if (!annee) annee = new Date().getFullYear();

    // (2) LIGNE D'EN-TÊTE : la ligne où la colonne A vaut "Personnel" ; sinon repli sur la table figée
    let headerRow = null;
    for (let r=1; r<=40; r++){
      const a = cells[`A${r}`];
      if (a && String(a).trim().toLowerCase()==="personnel") { headerRow = r; break; }
    }
    if (!headerRow) headerRow = HEADER[moisNum] || 11;

    // (3) COLONNES-JOURS : détectées depuis l'en-tête. Une colonne n'est un "jour" que si son
    //     en-tête contient un nombre valide dans [1..nb de jours du mois]. La colonne "Heures du
    //     mois" (sans n° de jour) et tout ce qui dépasse le mois sont automatiquement exclus.
    const nbJoursMois = new Date(annee, moisNum, 0).getDate(); // 28/29/30/31 — bissextiles gérées
    const colJour = {}; // colonne -> numéro de jour
    for (let col=2; col<=50; col++){
      const h = cells[`${colName(col)}${headerRow}`];
      if (h==null || h==="") continue;
      const nums = String(h).match(/\d{1,2}/g);
      if (!nums) continue;
      const jour = parseInt(nums[nums.length-1]);
      if (jour>=1 && jour<=nbJoursMois) colJour[col] = jour;
    }

    // (4) SALARIÉS : à partir de headerRow+1, jusqu'à 3 lignes vides d'affilée (colonne A)
    let vides = 0;
    for (let row = headerRow+1; row <= headerRow+80 && vides < 3; row++){
      const nom = cells[`A${row}`];
      if (!nom || String(nom).trim()==="") { vides++; continue; }
      vides = 0;
      if (String(nom).trim().toLowerCase().startsWith("total")) break; // fin de liste : "TOTAL ÉQUIPE"
      if (estNomValide(nom)) nomsVus.add(String(nom).trim()); // mémoriser pour création auto
      const empId = matchEmp(nom);
      if (!empId) continue;
      // ne parcourir QUE les vraies colonnes-jours détectées
      for (const colKey in colJour){
        const col = +colKey;
        const code = cells[`${colName(col)}${row}`];
        if (!code) continue;
        let entry = CODE_HORAIRES[code] ? { creneaux: CODE_HORAIRES[code].creneaux.map(cr=>({debut:cr.debut, fin:cr.fin})) } : null;
        if (!entry) entry = parseHoraire(code);
        if (!entry) {
          const norm = String(code).trim().toUpperCase();
          if (!NON_HORAIRE.has(norm) && !NON_HORAIRE.has(norm.replace(/^H\s*/, ""))) {
            inconnues[code] = (inconnues[code]||0) + 1;
          }
          continue;
        }
        const jour = colJour[col];
        const dateISO = `${annee}-${String(moisNum).padStart(2,"0")}-${String(jour).padStart(2,"0")}`;
        if (!planning[dateISO]) planning[dateISO] = {};
        planning[dateISO][empId] = { creneaux: entry.creneaux, code };
      }
    }
  }
  return { planning, inconnues, noms: [...nomsVus], personnel };
}

/* numéro de jour depuis la ligne d'en-tête (ex "Ven 1", "Lun 5" ou nombre) */
function readDayNumber(cells, headerRow, colLetter, col) {
  const raw = cells[`${colLetter}${headerRow}`];
  if (raw==null || raw==="") return col-1; // fallback : colonne B = jour 1
  // prendre le DERNIER nombre de la chaîne (le n° de jour suit le nom du jour)
  const nums = String(raw).match(/\d{1,2}/g);
  if (nums && nums.length) return parseInt(nums[nums.length-1]);
  return col-1;
}

function colName(n){ let s=""; while(n>0){ s=String.fromCharCode(65+(n-1)%26)+s; n=Math.floor((n-1)/26);} return s; }

/* détecte les différences entre deux plannings */
function detectPlanningChanges(oldP, newP) {
  const changes = [];
  const lbl = entry => entry && entry.creneaux ? entry.creneaux.map(c=>`${c.debut}-${c.fin}`).join(" / ") : "(rien)";
  const allDates = new Set([...Object.keys(oldP), ...Object.keys(newP)]);
  allDates.forEach(d=>{
    const o = oldP[d]||{}, n = newP[d]||{};
    const ids = new Set([...Object.keys(o), ...Object.keys(n)]);
    ids.forEach(id=>{
      const ol = lbl(o[id]);
      const nl = lbl(n[id]);
      if (ol!==nl) changes.push({ key:`${d}_${id}`, date:d, empId:id, empNom:emp(id)?.nom||id, oldLabel:ol, newLabel:nl });
    });
  });
  return changes;
}

/* Dernier jour pointé clôturé = jour le plus récent, ANTÉRIEUR à aujourd'hui,
   ayant au moins un pointage. Renvoie une date ISO ou null. */
function dernierJourPointeCloture() {
  const jours = [...new Set(DB.pointages.map(p=>p.date))]
    .filter(d => d < App.currentDate)
    .sort();
  return jours.length ? jours[jours.length-1] : null;
}

/* Fusion d'un planning Excel importé avec le planning existant (restauré).
   Les jours <= dernier jour pointé clôturé sont FIGÉS : on garde l'existant.
   Tout écart proposé par l'Excel sur un jour figé est journalisé (option b).
   Renvoie le planning fusionné. */
function fusionnerPlanning(planningExcel) {
  const gel = dernierJourPointeCloture(); // peut être null
  const lbl = entry => entry && entry.creneaux ? entry.creneaux.map(c=>`${c.debut}-${c.fin}`).join(" / ") : "(rien)";
  const fusion = {};
  // 1) Conserver tout l'existant (priorité aux données restaurées)
  Object.keys(DB.planning||{}).forEach(d=>{ fusion[d] = DB.planning[d]; });
  // 2) Intégrer l'Excel, en respectant le gel
  let conflits = 0, appliques = 0;
  Object.keys(planningExcel).forEach(d=>{
    const estFige = gel && d <= gel;
    if (estFige) {
      // jour figé : on NE remplace PAS, mais on trace tout écart
      const ancien = DB.planning[d] || {};
      const nouveau = planningExcel[d] || {};
      const ids = new Set([...Object.keys(ancien), ...Object.keys(nouveau)]);
      ids.forEach(id=>{
        if (lbl(ancien[id]) !== lbl(nouveau[id])) {
          conflits++;
          logAction("Système", "Conflit planning ignoré (jour clôturé)",
            `${emp(id)?.nom||id} — ${d} : l'import proposait ${lbl(nouveau[id])} mais le jour est déjà clôturé (conservé : ${lbl(ancien[id])})`);
        }
      });
      // on garde l'existant tel quel (déjà copié à l'étape 1)
    } else {
      // jour non figé (futur ou non encore clôturé) : on applique l'Excel,
      // MAIS on préserve le créneau de toute personne ayant DÉJÀ POINTÉ ce jour-là
      // (sinon un import qui ne contient pas cette personne effacerait son créneau du jour en cours).
      const nouveau = Object.assign({}, planningExcel[d] || {});
      const ancien = DB.planning[d] || {};
      const pointes = new Set(DB.pointages.filter(p=>p.date===d).map(p=>p.empId));
      Object.keys(ancien).forEach(id=>{
        if (pointes.has(id)) {
          if (lbl(ancien[id]) !== lbl(nouveau[id])) {
            conflits++;
            logAction("Système", "Créneau protégé (déjà pointé)",
              `${emp(id)?.nom||id} — ${d} : a déjà pointé, l'import proposait ${lbl(nouveau[id])} → créneau conservé (${lbl(ancien[id])})`);
          }
          nouveau[id] = ancien[id]; // on conserve le créneau existant de la personne ayant pointé
        }
      });
      fusion[d] = nouveau;
      appliques++;
    }
  });
  return { fusion, gel, conflits, appliques };
}

/* ====================================================================
   MINI-LECTEUR XLSX (unzip + parsing XML) — sans dépendance
   ==================================================================== */
async function unzipXlsx(arrayBuffer) {
  // Implémentation minimale de lecture ZIP (deflate via DecompressionStream)
  const view = new DataView(arrayBuffer);
  const files = {};
  // Trouver l'End Of Central Directory
  let eocd = arrayBuffer.byteLength - 22;
  while (eocd>=0 && view.getUint32(eocd,true)!==0x06054b50) eocd--;
  if (eocd<0) throw new Error("ZIP invalide");
  const cdOffset = view.getUint32(eocd+16,true);
  const cdCount = view.getUint16(eocd+10,true);
  let p = cdOffset;
  const decoder = new TextDecoder();
  const entries = [];
  for (let i=0;i<cdCount;i++){
    if (view.getUint32(p,true)!==0x02014b50) break;
    const method = view.getUint16(p+10,true);
    const compSize = view.getUint32(p+20,true);
    const nameLen = view.getUint16(p+28,true);
    const extraLen = view.getUint16(p+30,true);
    const commentLen = view.getUint16(p+32,true);
    const localOff = view.getUint32(p+42,true);
    const name = decoder.decode(new Uint8Array(arrayBuffer, p+46, nameLen));
    entries.push({ name, method, compSize, localOff });
    p += 46 + nameLen + extraLen + commentLen;
  }
  for (const en of entries){
    const lview = view;
    const lnameLen = lview.getUint16(en.localOff+26,true);
    const lextraLen = lview.getUint16(en.localOff+28,true);
    const dataStart = en.localOff + 30 + lnameLen + lextraLen;
    const compData = new Uint8Array(arrayBuffer, dataStart, en.compSize);
    let content;
    if (en.method===0) { content = compData; }
    else if (en.method===8) { content = await inflateRaw(compData); }
    else continue;
    files[en.name] = decoder.decode(content);
  }
  return files;
}
async function inflateRaw(bytes) {
  const ds = new DecompressionStream("deflate-raw");
  const stream = new Response(bytes).body.pipeThrough(ds);
  const buf = await new Response(stream).arrayBuffer();
  return new Uint8Array(buf);
}
function parseSharedStrings(xml){
  const arr=[]; if(!xml) return arr;
  const re=/<si>([\s\S]*?)<\/si>/g; let m;
  while(m=re.exec(xml)){
    const texts=[...m[1].matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]);
    arr.push(decodeXml(texts.join("")));
  }
  return arr;
}
function parseWorkbook(xml){
  const sheets=[];
  const re=/<sheet[^>]*name="([^"]*)"[^>]*r:id="([^"]*)"[^>]*\/>/g; let m;
  while(m=re.exec(xml)) sheets.push({name:decodeXml(m[1]), rId:m[2]});
  if(!sheets.length){
    const re2=/<sheet[^>]*r:id="([^"]*)"[^>]*name="([^"]*)"[^>]*\/>/g;
    while(m=re2.exec(xml)) sheets.push({name:decodeXml(m[2]), rId:m[1]});
  }
  return { sheets };
}
function parseRels(xml){
  const rels={}; if(!xml) return rels;
  // Robuste à l'ordre des attributs (Id/Target/Type dans n'importe quel ordre)
  const re=/<Relationship\b([^>]*)\/>/g; let m;
  while(m=re.exec(xml)){
    const attrs=m[1];
    const id=(attrs.match(/\bId="([^"]*)"/)||[])[1];
    const target=(attrs.match(/\bTarget="([^"]*)"/)||[])[1];
    if(id&&target) rels[id]=target;
  }
  return rels;
}
function parseSheet(xml, sst){
  const cells={};
  const re=/<c r="([A-Z]+\d+)"(?:[^>]*t="([^"]*)")?[^>]*>([\s\S]*?)<\/c>/g; let m;
  while(m=re.exec(xml)){
    const ref=m[1], type=m[2];
    const vMatch=m[3].match(/<v>([\s\S]*?)<\/v>/);
    const isMatch=m[3].match(/<t[^>]*>([\s\S]*?)<\/t>/);
    let val=null;
    if(type==="s" && vMatch){ val=sst[parseInt(vMatch[1])]; }
    else if(type==="inlineStr" && isMatch){ val=decodeXml(isMatch[1]); }
    else if(vMatch){ val=vMatch[1]; }
    if(val!=null) cells[ref]=val;
  }
  // cellules vides auto-closing
  const re2=/<c r="([A-Z]+\d+)"(?:[^>]*t="([^"]*)")?[^>]*\/>/g;
  return cells;
}
function decodeXml(s){
  return String(s)
    .replace(/&#10;/g," ").replace(/&#13;/g," ")
    .replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(parseInt(n,10)))
    .replace(/&#x([0-9a-fA-F]+);/g,(_,n)=>String.fromCharCode(parseInt(n,16)))
    .replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&apos;/g,"'");
}

/* ====================================================================
   HELPERS UI : modale, toast, download, horloge
   ==================================================================== */
function openModal(html){ const o=document.getElementById("overlay"); o.innerHTML=`<div class="modal">${html}</div>`; o.classList.add("active"); }
function closeModal(){ document.getElementById("overlay").classList.remove("active"); document.getElementById("overlay").innerHTML=""; }
function toast(msg,type){ const z=document.getElementById("toastZone"); const t=document.createElement("div"); t.className="toast "+(type||""); t.textContent=msg; z.appendChild(t); setTimeout(()=>{t.style.opacity="0"; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(),400);},3200); }
function downloadFile(content, name, mime){
  const blob=new Blob(["\ufeff"+content],{type:mime+";charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}
function tickClock(){
  const d=new Date();
  document.getElementById("clkTime").textContent=d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("clkDate").textContent=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});

  // Changement de jour métier (bascule à 6h) : on recale l'app sur le nouveau jour
  const jour = businessDayISO(d);
  if (jour !== App.currentDate) {
    // RÈGLE 3 : clôturer les départs oubliés de la/des journée(s) terminée(s)
    cloturerJoursEcoules(jour);
    App.currentDate = jour;
    App.jourConsulte = jour;
    App.moisSel = jour.slice(0,7);
    logAction("Système", "Nouveau jour", `Passage au ${jour} (bascule ${HEURE_BASCULE_JOUR}h)`);
    // Si l'écran de badgeage est affiché, il repart à zéro pour la nouvelle journée
    const badgeScreen = document.getElementById("scr-badge");
    if (badgeScreen && badgeScreen.classList.contains("active")) {
      App.renderBadge();
    }
    // Si un admin est sur l'onglet du jour, on le rafraîchit aussi
    const adminScreen = document.getElementById("scr-admin");
    if (adminScreen && adminScreen.classList.contains("active") && App.session) {
      App.renderAdminPanel();
    }
  }

  // Une fois par minute (à la seconde 0), vérifier le déblocage automatique de 8h
  if (d.getSeconds()===0 && DB && DB.security && DB.security.locked) {
    if (checkAutoUnlock()) {
      // si l'écran de login verrouillé est affiché, le rafraîchir
      const adminScreen = document.getElementById("scr-admin");
      if (adminScreen && adminScreen.classList.contains("active") && !App.session) {
        App.renderAdminLogin();
      }
    }
  }

  // PAUSE REPAS : si l'écran de badgeage est actif, gérer le minuteur live et la clôture auto
  const badgeActif = document.getElementById("scr-badge") && document.getElementById("scr-badge").classList.contains("active");
  if (DB && badgeActif) {
    // clôture auto des pauses dépassant la fin de service prévue (anti-abus)
    const aCloture = App.cloturerPausesDepassees();
    // rafraîchir l'affichage chaque minute s'il y a une pause en cours (pour le minuteur live + bascule rouge)
    const pauseActive = prevusDuJour(App.currentDate).some(id=>pauseEnCours(id, App.currentDate));
    if (aCloture || (pauseActive && d.getSeconds()===0)) {
      App.renderBadge();
    }
  }
}

/* ====================================================================
   DÉMARRAGE
   ==================================================================== */
(async function demarrer(){
  await loadDB();   // charge depuis IndexedDB (avec migration de l'ancien localStorage si besoin)
  // RÈGLE 3 : au démarrage, clôturer les départs oubliés des journées déjà écoulées
  cloturerJoursEcoules(App.currentDate);
  tickClock(); setInterval(tickClock,1000);
  // Au réveil de la tablette / retour sur l'onglet, recaler immédiatement le jour
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) tickClock(); });
  window.addEventListener("focus", tickClock);
  App.showBadge();
  // Rappel de sauvegarde mensuelle : on note au journal si elle est due
  try{ App.verifierRappelSauvegarde(); }catch(e){}
})();
